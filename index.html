<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>家庭旅游相册 — 我们的旅行足迹</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
  --cream: #FFF8F0; --cream-dark: #F5EDE0; --cream-darker: #EBE0D0;
  --gold: #D4A853; --gold-light: #E8CC7A; --gold-dark: #B8860B; --gold-pale: #F5E6C8;
  --amber: #C4953A; --text-primary: #2C2416; --text-secondary: #5C5242;
  --text-muted: #8A7E6E; --text-on-dark: #E8DCC8; --dark-bg: #1E1810; --dark-bg-alt: #282118;
  --white: #FFFFFF; --shadow-sm: 0 1px 3px rgba(44,36,22,0.06);
  --shadow-md: 0 4px 16px rgba(44,36,22,0.08); --shadow-lg: 0 12px 40px rgba(44,36,22,0.12);
  --shadow-xl: 0 24px 60px rgba(44,36,22,0.16);
  --radius-sm: 6px; --radius-md: 12px; --radius-lg: 20px; --radius-xl: 28px;
  --transition: 0.3s cubic-bezier(0.4,0,0.2,1);
  --font-serif: 'Noto Serif SC','Playfair Display',serif;
  --font-sans: 'Noto Sans SC',-apple-system,sans-serif;
  --max-width: 1440px; --navbar-height: 64px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;font-size:16px;-webkit-font-smoothing:antialiased}
body{font-family:var(--font-sans);background:var(--cream);color:var(--text-primary);line-height:1.7;overflow-x:hidden;min-height:100vh}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--cream-dark)}
::-webkit-scrollbar-thumb{background:var(--gold);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--gold-dark)}

/* ===== NAVBAR ===== */
.navbar{position:fixed;top:0;left:0;right:0;height:var(--navbar-height);background:rgba(255,248,240,0.78);backdrop-filter:blur(20px) saturate(1.4);-webkit-backdrop-filter:blur(20px) saturate(1.4);border-bottom:1px solid rgba(212,168,83,0.15);z-index:1000;display:flex;align-items:center;justify-content:center;transition:var(--transition)}
.navbar.scrolled{box-shadow:var(--shadow-md);background:rgba(255,248,240,0.92)}
.navbar-inner{width:100%;max-width:var(--max-width);padding:0 40px;display:flex;align-items:center;justify-content:space-between}
.nav-logo{font-family:var(--font-serif);font-size:1.35rem;font-weight:700;color:var(--gold-dark);letter-spacing:0.04em;display:flex;align-items:center;gap:10px;text-decoration:none;cursor:pointer}
.nav-logo .logo-icon{width:34px;height:34px;background:linear-gradient(135deg,var(--gold),var(--gold-dark));border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:0.9rem}
.nav-links{display:flex;gap:32px;list-style:none;align-items:center}
.nav-links a,.nav-links button{font-family:var(--font-sans);font-size:0.85rem;font-weight:400;color:var(--text-secondary);text-decoration:none;letter-spacing:0.02em;transition:var(--transition);position:relative;padding:4px 0;background:none;border:none;cursor:pointer}
.nav-links a::after,.nav-links button::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:1.5px;background:var(--gold);transform:scaleX(0);transition:transform 0.3s ease}
.nav-links a:hover,.nav-links button:hover{color:var(--gold-dark)}
.nav-links a:hover::after,.nav-links button:hover::after{transform:scaleX(1)}
.nav-btn{padding:8px 20px;background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#fff!important;border:none;border-radius:20px;font-family:var(--font-sans);font-size:0.8rem!important;cursor:pointer;transition:var(--transition);letter-spacing:0.03em}
.nav-btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(184,134,11,0.3)}
.nav-btn::after{display:none!important}

/* ===== HERO ===== */
.hero{margin-top:var(--navbar-height);padding:60px 40px 40px;text-align:center;max-width:var(--max-width);margin-left:auto;margin-right:auto;position:relative}
.hero-eyebrow{font-family:var(--font-sans);font-size:0.7rem;font-weight:400;letter-spacing:0.25em;text-transform:uppercase;color:var(--gold);margin-bottom:12px}
.hero h1{font-family:var(--font-serif);font-size:3rem;font-weight:700;color:var(--text-primary);letter-spacing:0.03em;margin-bottom:12px;line-height:1.25;display:inline-block;position:relative}
.hero-subtitle{font-family:var(--font-serif);font-size:1.1rem;font-style:italic;color:var(--text-muted);font-weight:400}
.hero-line{width:60px;height:2px;background:var(--gold);margin:20px auto 0;border-radius:1px}
.hero-edit-btn{position:absolute;right:40px;top:70px;width:36px;height:36px;border-radius:50%;border:1px solid rgba(212,168,83,0.2);background:var(--white);color:var(--text-muted);cursor:pointer;font-size:0.85rem;display:flex;align-items:center;justify-content:center;transition:var(--transition);opacity:0}
.hero:hover .hero-edit-btn{opacity:1}
.hero-edit-btn:hover{color:var(--gold-dark);border-color:var(--gold);box-shadow:var(--shadow-sm)}

/* ===== MAIN CONTENT ===== */
.main-content{max-width:var(--max-width);margin:0 auto;padding:0 40px 60px;display:flex;gap:0;position:relative;min-height:700px}

/* Timeline */
.timeline-col{width:90px;flex-shrink:0;position:relative;padding-top:20px}
.timeline-track{position:sticky;top:calc(var(--navbar-height) + 40px);display:flex;flex-direction:column;align-items:center;gap:6px}
.timeline-line{position:absolute;top:0;bottom:0;left:50%;width:1.5px;background:linear-gradient(to bottom,var(--gold),var(--gold-pale),var(--gold));transform:translateX(-50%);border-radius:1px}
.timeline-year{position:relative;z-index:2;font-family:var(--font-serif);font-size:0.85rem;font-weight:600;color:var(--gold-dark);cursor:pointer;padding:10px 8px;transition:var(--transition);text-align:center;width:100%;border-radius:var(--radius-sm);letter-spacing:0.03em;background:none;border:none}
.timeline-year:hover{color:var(--gold-dark);background:rgba(212,168,83,0.08)}
.timeline-year.active{color:#fff;background:var(--gold);border-radius:20px}
.timeline-dot{display:block;width:10px;height:10px;background:var(--gold);border-radius:50%;border:2px solid var(--cream);box-shadow:0 0 0 3px var(--gold-pale);margin:0 auto 4px;transition:var(--transition)}
.timeline-year.active .timeline-dot{background:var(--gold-dark);box-shadow:0 0 0 6px rgba(212,168,83,0.2)}
.timeline-trips{display:none;flex-direction:column;gap:2px;margin-top:4px}
.timeline-year.expanded .timeline-trips{display:flex}
.timeline-trip{font-family:var(--font-sans);font-size:0.68rem;color:var(--text-muted);cursor:pointer;padding:3px 8px;border-radius:10px;transition:var(--transition);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:80px;text-align:center;background:none;border:none}
.timeline-trip:hover{color:var(--gold-dark);background:rgba(212,168,83,0.06)}

/* Map */
.map-col{flex:1;min-width:0;padding:0 20px}
.map-wrapper{position:sticky;top:calc(var(--navbar-height) + 40px);height:580px;border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow-lg);border:2px solid rgba(212,168,83,0.12);background:var(--cream-dark);transition:var(--transition)}
.map-wrapper:hover{box-shadow:var(--shadow-xl);border-color:rgba(212,168,83,0.22)}
#map{width:100%;height:100%}
.leaflet-container{background:var(--cream-dark)!important;font-family:var(--font-sans)!important}
.leaflet-popup-content-wrapper{border-radius:var(--radius-md)!important;box-shadow:var(--shadow-lg)!important;border:1px solid rgba(212,168,83,0.15)!important;padding:0!important;overflow:hidden}
.leaflet-popup-content{margin:0!important;font-family:var(--font-sans)!important;min-width:200px}
.leaflet-popup-close-button{color:var(--text-secondary)!important;padding:8px!important;z-index:10}

.pulse-marker{width:18px;height:18px;background:var(--gold);border-radius:50%;border:3px solid #fff;box-shadow:0 2px 8px rgba(184,134,11,0.4);position:relative;transition:transform 0.2s ease}
.pulse-marker::before{content:'';position:absolute;top:-8px;left:-8px;width:28px;height:28px;border-radius:50%;border:2px solid rgba(212,168,83,0.5);animation:pulse-ring 2s ease-out infinite}
.pulse-marker.active{background:var(--gold-dark);transform:scale(1.3);border-color:#fff;box-shadow:0 4px 16px rgba(184,134,11,0.6)}
.pulse-marker.active::before{border-color:rgba(184,134,11,0.6);animation-duration:1.2s}
@keyframes pulse-ring{0%{transform:scale(0.8);opacity:1}100%{transform:scale(2.2);opacity:0}}

.map-popup-card img{width:100%;height:100px;object-fit:cover;display:block}
.map-popup-card .popup-body{padding:10px 12px}
.map-popup-card h4{font-family:var(--font-serif);font-size:0.9rem;color:var(--text-primary);margin-bottom:2px}
.map-popup-card .popup-loc{font-size:0.68rem;color:var(--gold-dark);font-weight:500;margin-bottom:2px}
.map-popup-card .popup-date{font-size:0.68rem;color:var(--text-muted)}

/* ===== SIDE PANEL ===== */
.side-panel{width:380px;flex-shrink:0;display:flex;flex-direction:column;gap:14px}
.side-panel-header{position:sticky;top:calc(var(--navbar-height) + 40px);background:rgba(255,248,240,0.9);backdrop-filter:blur(12px);z-index:5;padding-bottom:4px}
.side-panel-title{font-family:var(--font-serif);font-size:1.1rem;font-weight:600;color:var(--text-primary);margin-bottom:10px;letter-spacing:0.02em}
.tag-filters{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:4px}
.tag-pill{padding:4px 14px;border-radius:14px;font-size:0.68rem;font-weight:400;border:1px solid rgba(212,168,83,0.25);background:transparent;color:var(--text-secondary);cursor:pointer;transition:var(--transition);letter-spacing:0.02em;white-space:nowrap;font-family:var(--font-sans)}
.tag-pill:hover{border-color:var(--gold);color:var(--gold-dark)}
.tag-pill.active{background:var(--gold);border-color:var(--gold);color:#fff}
.side-panel-actions{display:flex;gap:8px;margin-top:4px}
.btn-add{flex:1;padding:10px;border-radius:var(--radius-sm);border:1.5px dashed rgba(212,168,83,0.4);background:transparent;color:var(--gold-dark);font-family:var(--font-sans);font-size:0.78rem;cursor:pointer;transition:var(--transition);letter-spacing:0.03em;display:flex;align-items:center;justify-content:center;gap:6px}
.btn-add:hover{background:rgba(212,168,83,0.06);border-color:var(--gold)}
.btn-export{padding:10px 16px;border-radius:var(--radius-sm);border:1px solid rgba(212,168,83,0.2);background:transparent;color:var(--text-muted);font-family:var(--font-sans);font-size:0.73rem;cursor:pointer;transition:var(--transition);white-space:nowrap}
.btn-export:hover{color:var(--gold-dark);border-color:var(--gold)}
.cards-list{display:flex;flex-direction:column;gap:12px;max-height:calc(100vh - 300px);overflow-y:auto;padding-right:4px}

/* ===== DESTINATION CARD (Compact) ===== */
.dest-card{background:var(--white);border-radius:var(--radius-md);overflow:hidden;box-shadow:var(--shadow-sm);border:1px solid rgba(212,168,83,0.08);transition:var(--transition);cursor:pointer;position:relative}
.dest-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px);border-color:rgba(212,168,83,0.2)}
.dest-card.active{border-color:var(--gold);box-shadow:0 0 0 3px rgba(212,168,83,0.12),var(--shadow-md)}
.dest-card .card-thumb-area{position:relative;height:130px;overflow:hidden}
.dest-card .card-thumb-area img{width:100%;height:100%;object-fit:cover;transition:transform 0.6s ease}
.dest-card:hover .card-thumb-area img{transform:scale(1.05)}
.dest-card .card-body{padding:12px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.dest-card .card-info{flex:1;min-width:0}
.dest-card .card-title{font-family:var(--font-serif);font-size:0.9rem;font-weight:600;color:var(--text-primary);letter-spacing:0.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dest-card .card-sub{font-size:0.68rem;color:var(--text-muted);margin-top:2px}
.dest-card .card-sub span{margin-right:10px}
.dest-card .card-more{flex-shrink:0;font-size:0.72rem;color:var(--gold-dark);font-weight:500;cursor:pointer;padding:6px 14px;border-radius:16px;border:1px solid rgba(212,168,83,0.25);background:transparent;transition:var(--transition);font-family:var(--font-sans);letter-spacing:0.03em;white-space:nowrap}
.dest-card .card-more:hover{background:var(--gold);border-color:var(--gold);color:#fff}

/* ===== SECTION EDIT BUTTON (subtle) ===== */
.section-edit{display:inline-flex;align-items:center;gap:4px;font-size:0.7rem;color:var(--text-muted);cursor:pointer;border:none;background:none;font-family:var(--font-sans);padding:4px 8px;border-radius:12px;transition:var(--transition);letter-spacing:0.03em;margin-left:8px;vertical-align:middle}
.section-edit:hover{color:var(--gold-dark);background:rgba(212,168,83,0.08)}
.section-edit::before{content:'✎';font-size:0.65rem}

/* ===== MORE LINK ===== */
.more-link{display:inline-flex;align-items:center;gap:4px;color:var(--gold-dark);font-size:0.75rem;cursor:pointer;border:none;background:none;font-family:var(--font-sans);transition:var(--transition);padding:6px 0;letter-spacing:0.02em}
.more-link::after{content:'→';transition:transform 0.3s ease,opacity 0.3s ease}
.more-link:hover{gap:8px;color:var(--amber)}
.more-link:hover::after{transform:translateX(3px)}

/* ===== DETAIL MODAL ===== */
.modal-overlay{position:fixed;inset:0;background:rgba(20,16,10,0.5);z-index:5000;display:flex;align-items:center;justify-content:center;animation:fadeIn 0.25s ease;padding:20px}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.detail-modal{background:var(--white);border-radius:var(--radius-lg);width:100%;max-width:640px;max-height:85vh;overflow-y:auto;box-shadow:var(--shadow-xl);animation:slideUp 0.3s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.detail-modal .detail-carousel{position:relative;height:340px;overflow:hidden;background:var(--cream-dark)}
.detail-modal .detail-carousel img{width:100%;height:100%;object-fit:cover}
.detail-modal .carousel-arrow{position:absolute;top:50%;transform:translateY(-50%);width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.85);border:none;cursor:pointer;font-size:1rem;color:var(--text-secondary);display:flex;align-items:center;justify-content:center;transition:var(--transition);z-index:2}
.detail-modal .carousel-arrow:hover{background:#fff;color:var(--gold-dark)}
.detail-modal .carousel-arrow.left{left:10px}
.detail-modal .carousel-arrow.right{right:10px}
.detail-modal .carousel-dots{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);display:flex;gap:5px}
.detail-modal .carousel-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.5);transition:var(--transition)}
.detail-modal .carousel-dot.active{background:#fff;width:18px;border-radius:3px}
.detail-modal .detail-close{position:absolute;top:12px;right:16px;width:34px;height:34px;border-radius:50%;background:rgba(0,0,0,0.3);border:none;color:#fff;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--transition);z-index:10}
.detail-modal .detail-close:hover{background:rgba(0,0,0,0.5)}
.detail-modal .detail-body{padding:24px 28px 20px}
.detail-modal .detail-title{font-family:var(--font-serif);font-size:1.5rem;font-weight:700;color:var(--text-primary);margin-bottom:2px;letter-spacing:0.02em}
.detail-modal .detail-location{font-size:0.85rem;color:var(--gold-dark);font-weight:500;margin-bottom:16px}
.detail-modal .detail-meta{display:grid;grid-template-columns:1fr 1fr;gap:8px 24px;margin-bottom:14px}
.detail-modal .detail-meta-item{font-size:0.78rem;color:var(--text-secondary)}
.detail-modal .detail-meta-item strong{font-weight:500;color:var(--text-primary);margin-right:4px}
.detail-modal .detail-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.detail-modal .detail-tags span{padding:3px 12px;border-radius:12px;background:var(--gold-pale);color:var(--gold-dark);font-size:0.7rem}
.detail-modal .detail-note-title{font-family:var(--font-serif);font-size:0.9rem;font-weight:600;color:var(--text-primary);margin-bottom:6px;letter-spacing:0.02em}
.detail-modal .detail-note{font-size:0.82rem;color:var(--text-secondary);line-height:1.8;margin-bottom:18px}
.detail-modal .detail-actions{display:flex;gap:10px;padding-top:16px;border-top:1px solid var(--cream-darker)}
.detail-btn{padding:10px 22px;border-radius:20px;font-family:var(--font-sans);font-size:0.78rem;cursor:pointer;transition:var(--transition);letter-spacing:0.03em;border:none}
.detail-btn.primary{background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#fff}
.detail-btn.primary:hover{box-shadow:0 4px 16px rgba(184,134,11,0.3);transform:translateY(-1px)}
.detail-btn.ghost{border:1.5px solid var(--cream-darker);background:transparent;color:var(--text-secondary)}
.detail-btn.ghost:hover{border-color:var(--text-muted)}
.detail-btn.danger{border:1.5px solid rgba(212,117,107,0.2);background:transparent;color:#d4756b}
.detail-btn.danger:hover{border-color:#d4756b;background:rgba(212,117,107,0.04)}

/* ===== NOTE MODAL ===== */
.note-modal{background:var(--white);border-radius:var(--radius-lg);width:100%;max-width:540px;max-height:85vh;overflow-y:auto;box-shadow:var(--shadow-xl);animation:slideUp 0.3s ease;padding:28px}
.note-modal h3{font-family:var(--font-serif);font-size:1.15rem;margin-bottom:4px;color:var(--text-primary);letter-spacing:0.02em}
.note-modal .note-meta-text{font-size:0.73rem;color:var(--text-muted);margin-bottom:16px}
.note-modal textarea{width:100%;min-height:160px;padding:14px;border:1.5px solid var(--cream-darker);border-radius:var(--radius-sm);font-family:var(--font-sans);font-size:0.84rem;color:var(--text-primary);line-height:1.8;background:var(--cream);resize:vertical;transition:var(--transition)}
.note-modal textarea:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(212,168,83,0.08)}
.note-modal .note-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:16px}

/* ===== SIMPLE EDIT MODAL (Hero) ===== */
.simple-modal{background:var(--white);border-radius:var(--radius-lg);width:100%;max-width:460px;box-shadow:var(--shadow-xl);animation:slideUp 0.3s ease;padding:28px}
.simple-modal h3{font-family:var(--font-serif);font-size:1.1rem;margin-bottom:16px;color:var(--text-primary);letter-spacing:0.02em}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:0.72rem;color:var(--text-secondary);margin-bottom:4px;font-weight:500;letter-spacing:0.03em}
.form-group input,.form-group textarea,.form-group select{width:100%;padding:10px 14px;border:1.5px solid var(--cream-darker);border-radius:var(--radius-sm);font-family:var(--font-sans);font-size:0.82rem;color:var(--text-primary);background:var(--cream);transition:var(--transition);resize:vertical}
.form-group input:focus,.form-group textarea:focus,.form-group select:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(212,168,83,0.08)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}

/* ===== SUMMARY BAR ===== */
.summary-bar{background:var(--dark-bg);color:var(--text-on-dark);padding:70px 40px 60px}
.summary-bar-inner{max-width:var(--max-width);margin:0 auto}

.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:40px;margin-bottom:60px;text-align:center}
.stat-item{padding:30px 20px}
.stat-number{font-family:var(--font-serif);font-size:3rem;font-weight:700;color:var(--gold-light);line-height:1.1;margin-bottom:4px}
.stat-number .unit{font-size:1.2rem;font-weight:400;color:var(--gold)}
.stat-label{font-size:0.82rem;color:var(--text-muted);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:10px}
.stat-detail{font-size:0.72rem;color:rgba(232,220,200,0.5);line-height:1.6}

.section-header{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:8px;flex-wrap:wrap}
.section-title{font-family:var(--font-serif);font-size:1.5rem;color:var(--gold-light);letter-spacing:0.03em}
.section-sub{text-align:center;font-size:0.78rem;color:var(--text-muted);margin-bottom:36px}

/* Waterfall */
.waterfall-gallery{columns:4;column-gap:16px;margin-bottom:24px}
.waterfall-item{break-inside:avoid;margin-bottom:16px;border-radius:var(--radius-sm);overflow:hidden;position:relative;cursor:pointer;transition:var(--transition)}
.waterfall-item img{width:100%;display:block;transition:transform 0.6s ease}
.waterfall-item:hover img{transform:scale(1.06)}
.waterfall-item .waterfall-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(30,24,16,0.85) 0%,transparent 60%);opacity:0;transition:var(--transition);display:flex;flex-direction:column;justify-content:flex-end;padding:14px}
.waterfall-item:hover .waterfall-overlay{opacity:1}
.waterfall-overlay .wf-location{font-family:var(--font-serif);font-size:0.85rem;font-weight:600;color:#fff}
.waterfall-overlay .wf-date{font-size:0.68rem;color:var(--gold-light)}
.gallery-more-wrap{text-align:center;margin-bottom:60px}
.gallery-more-btn{display:inline-flex;align-items:center;gap:6px;padding:12px 30px;border-radius:24px;border:1.5px solid rgba(212,168,83,0.3);background:transparent;color:var(--gold-light);font-family:var(--font-sans);font-size:0.8rem;cursor:pointer;transition:var(--transition);letter-spacing:0.04em}
.gallery-more-btn:hover{background:rgba(212,168,83,0.08);border-color:var(--gold);gap:12px}
.gallery-more-btn::after{content:'→';transition:transform 0.3s ease}
.gallery-more-btn:hover::after{transform:translateX(4px)}

/* Notes Grid */
.notes-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
.note-card{background:var(--dark-bg-alt);border-radius:var(--radius-md);padding:24px;border:1px solid rgba(212,168,83,0.08);transition:var(--transition)}
.note-card:hover{border-color:rgba(212,168,83,0.2);transform:translateY(-2px)}
.note-card .note-date{font-size:0.7rem;color:var(--gold);letter-spacing:0.05em;margin-bottom:6px}
.note-card .note-title{font-family:var(--font-serif);font-size:1rem;color:var(--text-on-dark);margin-bottom:8px}
.note-card .note-excerpt{font-size:0.75rem;color:var(--text-muted);line-height:1.7}
.note-card .note-actions-row{display:flex;gap:8px;margin-top:10px;justify-content:flex-end}

/* ===== FOOTER ===== */
.footer{background:var(--dark-bg);border-top:1px solid rgba(212,168,83,0.1);padding:30px 40px;text-align:center}
.footer-inner{max-width:var(--max-width);margin:0 auto;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px}
.footer-text{font-size:0.73rem;color:var(--text-muted);letter-spacing:0.03em}
.footer-links{display:flex;gap:24px}
.footer-links a,.footer-links button,.footer-links label{font-size:0.73rem;color:var(--text-muted);text-decoration:none;background:none;border:none;cursor:pointer;font-family:var(--font-sans);letter-spacing:0.03em;transition:var(--transition);padding:0}
.footer-links a:hover,.footer-links button:hover,.footer-links label:hover{color:var(--gold-light)}

/* ===== IMAGE VIEWER ===== */
.image-viewer-overlay{position:fixed;inset:0;background:rgba(20,16,10,0.96);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;animation:fadeIn 0.3s ease}
.viewer-close{position:absolute;top:20px;right:24px;width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:#fff;font-size:1.4rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--transition);z-index:10}
.viewer-close:hover{background:rgba(255,255,255,0.15)}
.viewer-main{flex:1;display:flex;align-items:center;justify-content:center;padding:80px 60px 20px;position:relative;width:100%}
.viewer-main img{max-width:100%;max-height:75vh;object-fit:contain;border-radius:4px;box-shadow:0 20px 60px rgba(0,0,0,0.5);animation:zoomIn 0.35s ease}
@keyframes zoomIn{from{opacity:0;transform:scale(0.92)}to{opacity:1;transform:scale(1)}}
.viewer-nav{position:absolute;top:50%;transform:translateY(-50%);width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);color:#fff;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--transition);z-index:10}
.viewer-nav:hover{background:rgba(255,255,255,0.14)}
.viewer-nav.prev{left:24px}
.viewer-nav.next{right:24px}
.viewer-thumbnails{display:flex;gap:8px;padding:16px 40px 24px;overflow-x:auto;max-width:100%;justify-content:center}
.viewer-thumb{width:56px;height:40px;border-radius:4px;overflow:hidden;cursor:pointer;opacity:0.4;transition:var(--transition);flex-shrink:0;border:2px solid transparent}
.viewer-thumb:hover{opacity:0.7}
.viewer-thumb.active{opacity:1;border-color:var(--gold)}
.viewer-thumb img{width:100%;height:100%;object-fit:cover}
.viewer-info{position:absolute;bottom:100px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.6);font-size:0.75rem;letter-spacing:0.04em}

/* ===== TOAST ===== */
.toast{position:fixed;bottom:36px;left:50%;transform:translateX(-50%);background:var(--dark-bg);color:var(--text-on-dark);padding:12px 28px;border-radius:24px;font-size:0.78rem;z-index:8000;box-shadow:var(--shadow-lg);animation:toastIn 0.3s ease,toastOut 0.3s ease 2.5s forwards;letter-spacing:0.03em}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes toastOut{from{opacity:1}to{opacity:0}}

/* ===== RESPONSIVE ===== */
@media(max-width:1280px){.side-panel{width:320px}.waterfall-gallery{columns:3}.notes-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:1024px){.main-content{flex-direction:column}.timeline-col{width:100%;padding-top:0}.timeline-track{position:static;flex-direction:row;flex-wrap:wrap;justify-content:center;gap:4px;padding-bottom:16px}.timeline-line{display:none}.timeline-year{width:auto;padding:6px 14px;font-size:0.75rem}.timeline-trip{max-width:none}.map-col{padding:0}.map-wrapper{position:static;height:400px;margin-bottom:20px}.side-panel{width:100%}.side-panel-header{position:static}.cards-list{max-height:none;flex-direction:row;flex-wrap:wrap}.dest-card{width:calc(50% - 6px)}.waterfall-gallery{columns:2}.notes-grid{grid-template-columns:1fr 1fr}.stats-row{gap:20px}.stat-number{font-size:2.2rem}}
@media(max-width:640px){.hero h1{font-size:1.8rem}.hero{padding:40px 16px 30px}.main-content{padding:0 16px 40px}.navbar-inner{padding:0 16px}.nav-links{gap:14px}.nav-links a,.nav-links button{font-size:0.7rem}.map-wrapper{height:320px;border-radius:var(--radius-md)}.dest-card{width:100%}.stats-row{grid-template-columns:1fr;gap:8px}.waterfall-gallery{columns:2;column-gap:8px}.waterfall-item{margin-bottom:8px}.notes-grid{grid-template-columns:1fr}.footer-inner{flex-direction:column;text-align:center}.summary-bar{padding:40px 16px}.detail-modal{max-width:95vw}.detail-modal .detail-carousel{height:220px}.detail-modal .detail-body{padding:16px}.detail-modal .detail-title{font-size:1.2rem}}

.gm-photo-item:hover .gm-photo-del{opacity:1}
.gm-photo-item .gm-photo-del:hover{background:rgba(212,90,80,0.9)}
.gm-add-row{display:flex;gap:8px;padding:6px 12px 12px}
.gm-add-row input{flex:1;padding:7px 10px;border:1.5px solid var(--cream-darker);border-radius:var(--radius-sm);font-size:0.72rem;font-family:var(--font-sans);background:var(--cream);transition:var(--transition)}
.gm-add-row input:focus{outline:none;border-color:var(--gold)}

.note-card .note-delete-btn{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:0.68rem;padding:2px 6px;border-radius:10px;transition:var(--transition);font-family:var(--font-sans)}

.pick-dest-modal{background:var(--white);border-radius:var(--radius-lg);width:100%;max-width:420px;max-height:70vh;overflow-y:auto;box-shadow:var(--shadow-xl);animation:slideUp 0.3s ease;padding:24px}
.pick-dest-modal h3{font-family:var(--font-serif);font-size:1.05rem;margin-bottom:16px;color:var(--text-primary)}
.pick-dest-item{padding:10px 14px;border-radius:var(--radius-sm);cursor:pointer;transition:var(--transition);border:1px solid transparent;margin-bottom:4px;display:flex;justify-content:space-between;align-items:center}
.pick-dest-item:hover{background:rgba(212,168,83,0.05);border-color:rgba(212,168,83,0.15)}
.pick-dest-item .pick-name{font-family:var(--font-serif);font-size:0.82rem;color:var(--text-primary)}
.pick-dest-item .pick-meta{font-size:0.65rem;color:var(--text-muted)}
</style>

function useLocalStorage(key, initialValue) {
  const [value, setValue] = useState(() => {try{const s=localStorage.getItem(key);return s?JSON.parse(s):initialValue}catch{return initialValue}});
  useEffect(() => {try{localStorage.setItem(key,JSON.stringify(value))}catch{}}, [key,value]);
  return [value, setValue];
}
function formatDate(d){if(!d)return"";const dt=new Date(d);return`${dt.getFullYear()}.${String(dt.getMonth()+1).padStart(2,"0")}.${String(dt.getDate()).padStart(2,"0")}`}
function formatCost(n){if(n>=10000)return(n/10000).toFixed(1)+"万";if(n>=1000)return(n/1000).toFixed(1)+"k";return String(n)}

function Toast({message,onDone}){
  useEffect(()=>{const t=setTimeout(onDone,2800);return()=>clearTimeout(t)},[onDone]);
  return <div className="toast">{message}</div>;
}

// ============================================================
// MAP
// ============================================================
function MapView({data,activeId,filteredIds,onMarkerClick,onAdd,onManage}){
  const mapRef=useRef(null);const mapInst=useRef(null);const markers=useRef({});
  useEffect(()=>{if(!mapRef.current)return;const m=L.map(mapRef.current,{center:[33.5,107],zoom:5,zoomControl:true,scrollWheelZoom:true,attributionControl:false});L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png",{maxZoom:18,minZoom:3}).addTo(m);L.control.attribution({position:"bottomleft",prefix:""}).addTo(m);mapInst.current=m;const ro=new ResizeObserver(()=>{m.invalidateSize()});ro.observe(mapRef.current);return()=>{ro.disconnect();m.remove();mapInst.current=null}},[]);

  useEffect(()=>{const m=mapInst.current;if(!m)return;Object.values(markers.current).forEach(mk=>mk.remove());markers.current={};const fd=filteredIds?data.filter(d=>filteredIds.has(d.id)):data;fd.forEach(d=>{const isActive=d.id===activeId;const icon=L.divIcon({className:"custom-marker-container",html:`<div class="pulse-marker${isActive?" active":""}"></div>`,iconSize:[34,34],iconAnchor:[17,17],popupAnchor:[0,-20]});const mk=L.marker(d.coordinates,{icon}).addTo(m);mk.bindPopup(`<div class="map-popup-card"><img src="${d.thumbnail}" alt="${d.placeName}" onerror="this.style.display='none'"/><div class="popup-body"><h4>${d.placeName}</h4><div class="popup-loc">${d.province} · ${d.city}</div><div class="popup-date">${formatDate(d.startDate)}${d.endDate!==d.startDate?" — "+formatDate(d.endDate):""}</div></div></div>`,{maxWidth:240,closeButton:true,className:"custom-popup"});mk.on("click",()=>onMarkerClick(d.id));mk.on("mouseover",function(){if(!this.getPopup().isOpen())this.openPopup()});markers.current[d.id]=mk})},[data,activeId,filteredIds,onMarkerClick]);

  useEffect(()=>{const m=mapInst.current;if(!m||!activeId)return;const d=data.find(x=>x.id===activeId);if(!d)return;m.flyTo(d.coordinates,12,{duration:1.2});const mk=markers.current[activeId];if(mk&&!mk.getPopup().isOpen())setTimeout(()=>mk.openPopup(),800)},[activeId,data]);

  return(
    <div className="map-col" id="map-section">
      <div className="map-wrapper">
        <div id="map" ref={mapRef}></div>
        <div className="map-toolbar">
          <button className="map-toolbar-btn" onClick={onAdd} title="新增目的地">+ 新增</button>
          <button className="map-toolbar-btn" onClick={onManage} title="管理目的地">✎ 管理</button>
        </div>
      </div>
    </div>
  );
}

function Footer({onExport,onImport}){

  return(
    <footer className="footer">

}

  const[idx,setIdx]=useState(startIndex||0);
  const valid=useMemo(()=>images.filter(Boolean),[images]);
  useEffect(()=>{const k=e=>{if(e.key==="Escape")onClose();if(e.key==="ArrowLeft")setIdx(i=>(i-1+valid.length)%valid.length);if(e.key==="ArrowRight")setIdx(i=>(i+1)%valid.length)};window.addEventListener("keydown",k);document.body.style.overflow="hidden";return()=>{window.removeEventListener("keydown",k);document.body.style.overflow=""}},[onClose,valid.length]);
  if(valid.length===0)return null;
  return(
    <div className="image-viewer-overlay" onClick={onClose}>
      <button className="viewer-close" onClick={onClose}>✕</button>
      <div className="viewer-info">{idx+1} / {valid.length}</div>
      <div className="viewer-main" onClick={e=>e.stopPropagation()}>
        <button className="viewer-nav prev" onClick={()=>setIdx(i=>(i-1+valid.length)%valid.length)}>‹</button>
        <img key={idx} src={valid[idx]} alt="" onError={e=>{e.target.style.display="none"}}/>
        <button className="viewer-nav next" onClick={()=>setIdx(i=>(i+1)%valid.length)}>›</button>
      </div>
      <div className="viewer-thumbnails" onClick={e=>e.stopPropagation()}>{valid.map((img,i)=><div key={i} className={`viewer-thumb${i===idx?" active":""}`} onClick={()=>setIdx(i)}><img src={img} alt="" onError={e=>{e.target.style.display="none"}}/></div>)}</div>
    </div>
  );
}

// ============================================================
// GALLERY MANAGER MODAL
// ============================================================
function GalleryManager({data,onDeletePhoto,onAddPhotos,onSetThumbnail,onClose}){
  const[addUrls,setAddUrls]=useState({});
  const setUrl=(destId,v)=>setAddUrls(p=>({...p,[destId]:v}));
  const handleAdd=(destId)=>{const urls=addUrls[destId];if(!urls||!urls.trim())return;const list=urls.split("\n").map(s=>s.trim()).filter(Boolean);if(list.length===0)return;onAddPhotos(destId,list);setUrl(destId,"")};
  useEffect(()=>{const k=e=>{if(e.key==="Escape")onClose()};window.addEventListener("keydown",k);return()=>window.removeEventListener("keydown",k)},[onClose]);

  return(
    <div className="modal-overlay" onClick={onClose}>
      <div className="gm-modal" onClick={e=>e.stopPropagation()}>
        <h3>🖼 管理照片</h3>
        {data.length===0&&<div className="gm-empty">还没有旅行记录，先去地图板块添加目的地吧</div>}
        {data.map(dest=>{const allPhotos=[dest.thumbnail,...(dest.images||[])].filter(Boolean);
          return(
            <div key={dest.id} className="gm-dest-group">
              <div className="gm-dest-header">
                <div>
                  <span className="gm-dest-name">{dest.placeName}</span>
                  <span className="gm-dest-meta" style={{marginLeft:10}}>{dest.province} · {dest.city} · {formatDate(dest.startDate)}</span>
                </div>
              </div>
              <div className="gm-photos-grid">
                {allPhotos.map((url,i)=>{
                  const isThumb=i===0&&url===dest.thumbnail;
                  return(
                    <div key={i} className={`gm-photo-item${isThumb?" is-thumb":""}`} title={isThumb?"封面照片":"点击设为封面"}>
                      <img src={url} alt="" onError={e=>{e.target.style.display="none"}}/>
                      <button className="gm-photo-del" onClick={()=>onDeletePhoto(dest.id,i)} title="删除照片">✕</button>
                      {!isThumb&&<button className="gm-set-thumb-btn" style={{position:"absolute",bottom:3,left:3,fontSize:"0.55rem",padding:"2px 6px"}} onClick={()=>onSetThumbnail(dest.id,url)}>封面</button>}
                    </div>
                  );
                })}
                {allPhotos.length===0&&<div style={{padding:10,fontSize:"0.68rem",color:"var(--text-muted)"}}>暂无照片</div>}
              </div>
              <div className="gm-add-row">
                <input value={addUrls[dest.id]||""} onChange={e=>setUrl(dest.id,e.target.value)} placeholder={`为「${dest.placeName}」添加照片URL（每行一个）…`}/>
                <button onClick={()=>handleAdd(dest.id)}>添加</button>
              </div>
            </div>
          );
        })}
        <div className="form-actions" style={{marginTop:8}}><button className="detail-btn ghost" onClick={onClose}>关闭</button></div>
      </div>
    </div>
  );
}

// ============================================================
// PICK DESTINATION MODAL (for adding note)
// ============================================================
function PickDestModal({data,onPick,onClose}){
  const noNote=data.filter(d=>!d.note);
  return(
    <div className="modal-overlay" onClick={onClose}>
      <div className="pick-dest-modal" onClick={e=>e.stopPropagation()}>
        <h3>选择目的地写手记</h3>
        {noNote.length===0&&<div className="gm-empty">所有目的地都已有手记了 ✨</div>}
        {noNote.map(d=>(
          <div key={d.id} className="pick-dest-item" onClick={()=>{onPick(d);onClose()}}>
            <div>
              <div className="pick-name">{d.placeName}</div>
              <div className="pick-meta">{d.province} · {d.city} · {formatDate(d.startDate)}</div>
            </div>
            <span style={{fontSize:"0.75rem",color:"var(--gold)"}}>→</span>
          </div>
        ))}
        <div className="form-actions" style={{marginTop:12}}><button className="detail-btn ghost" onClick={onClose}>取消</button></div>
      </div>
    </div>
  );
}

// ============================================================
// APP
// ============================================================
function App(){
  const[travelData,setTravelData]=useLocalStorage("familyTravelData_v2",defaultTravelData);
  const[heroData,setHeroData]=useLocalStorage("familyHeroData_v2",{title:"我们的旅行足迹",subtitle:"每一段旅程，都是家的延伸"});
  const[activeId,setActiveId]=useState(null);
  const[selectedYear,setSelectedYear]=useState(null);
  const[showAddEdit,setShowAddEdit]=useState(false);
  const[editingDest,setEditingDest]=useState(null);
  const[detailDest,setDetailDest]=useState(null);
  const[noteDest,setNoteDest]=useState(null);
  const[showHeroEdit,setShowHeroEdit]=useState(false);
  const[viewer,setViewer]=useState(null);
  const[toastMsg,setToastMsg]=useState(null);
  const[showGalleryMgr,setShowGalleryMgr]=useState(false);
  const[showPickNote,setShowPickNote]=useState(false);

  const filteredMapIds=useMemo(()=>{if(!selectedYear)return null;const ids=new Set(travelData.filter(d=>d.year===selectedYear).map(d=>d.id));return ids.size>0?ids:null},[travelData,selectedYear]);

  // Handlers
  const handleYearClick=y=>setSelectedYear(p=>p===y?null:y);
  const handleTripClick=d=>{setActiveId(d.id);setSelectedYear(d.year)};
  const handleMarkerClick=id=>{setActiveId(id);setTimeout(()=>{document.querySelector(".dest-card.active")?.scrollIntoView({behavior:"smooth",block:"center"})},100)};
  const handleSelectCard=id=>setActiveId(id);
  const handleDetail=dest=>setDetailDest(dest);
  const handleAdd=()=>{setEditingDest(null);setShowAddEdit(true)};
  const handleEdit=dest=>{setDetailDest(null);setEditingDest(dest);setShowAddEdit(true)};
  const handleDelete=id=>{setTravelData(p=>p.filter(d=>d.id!==id));if(activeId===id)setActiveId(null);setDetailDest(null);setToastMsg("已删除")};
  const handleSave=data=>{if(editingDest){setTravelData(p=>p.map(d=>d.id===data.id?data:d));setToastMsg("已更新 ✓")}else{setTravelData(p=>[data,...p]);setToastMsg("已添加 ✓")}setShowAddEdit(false);setEditingDest(null);if(data.id)setActiveId(data.id)};
  const handleNoteSave=updatedDest=>{setTravelData(p=>p.map(d=>d.id===updatedDest.id?updatedDest:d));setToastMsg("手记已保存 ✓")};
  const handleExport=()=>{const b=new Blob([JSON.stringify(travelData,null,2)],{type:"application/json"});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download=`family-travel-backup-${new Date().toISOString().slice(0,10)}.json`;a.click();URL.revokeObjectURL(u);setToastMsg("数据已导出 ✓")};
  const handleImport=data=>{if(window.confirm(`即将导入 ${data.length} 条记录，当前数据将被覆盖。确认？`)){setTravelData(data);setActiveId(null);setSelectedYear(null);setToastMsg(`成功导入 ${data.length} 条 ✓`)}};
  const handlePhotoClick=(imgs,idx)=>setViewer({images:imgs,startIndex:idx||0});
  const handleNoteDelete=destId=>{setTravelData(p=>p.map(d=>d.id===destId?{...d,note:""}:d));setToastMsg("手记已删除 ✓")};
  const handleDeletePhoto=(destId,imgIdx)=>{setTravelData(p=>p.map(d=>{if(d.id!==destId)return d;const all=[d.thumbnail,...(d.images||[])];all.splice(imgIdx,1);const newThumb=all[0]||"";const newImages=all.slice(1);return{...d,thumbnail:newThumb,images:newImages}}));setToastMsg("照片已删除 ✓")};
  const handleAddPhotos=(destId,urls)=>{setTravelData(p=>p.map(d=>{if(d.id!==destId)return d;const imgs=[...d.images||[],...urls];if(!d.thumbnail)return{...d,thumbnail:urls[0],images:imgs.slice(1)};return{...d,images:imgs}}));setToastMsg(`已添加 ${urls.length} 张照片 ✓`)};
  const handleSetThumbnail=(destId,url)=>{setTravelData(p=>p.map(d=>{if(d.id!==destId)return d;const all=[d.thumbnail,...(d.images||[])].filter(u=>u!==url);return{...d,thumbnail:url,images:all}}));setToastMsg("封面已更新 ✓")};
  const handlePickNoteDest=dest=>{setNoteDest(dest)};

  return(
    <div>
      <Navbar onAdd={handleAdd}/>
      <Hero heroData={heroData} onEditHero={()=>setShowHeroEdit(true)}/>

      <div className="main-content">
        <Timeline data={travelData} selectedYear={selectedYear} onYearClick={handleYearClick} onTripClick={handleTripClick}/>
        <MapView data={travelData} activeId={activeId} filteredIds={filteredMapIds} onMarkerClick={handleMarkerClick} onAdd={handleAdd} onManage={()=>{document.querySelector(".side-panel")?.scrollIntoView({behavior:"smooth",block:"start"})}}/>
        <SidePanel data={travelData} activeId={activeId} onSelect={handleSelectCard} onDetail={handleDetail} onAdd={handleAdd} onExport={handleExport}/>
      </div>

      <SummaryBar data={travelData} onPhotoClick={handlePhotoClick} onNoteExpand={dest=>setNoteDest(dest)} onNoteEdit={handleEdit} onNoteDelete={handleNoteDelete} onManageGallery={()=>setShowGalleryMgr(true)} onAddNote={()=>setShowPickNote(true)}/>

      <Footer onExport={handleExport} onImport={handleImport}/>

      {showHeroEdit&&<HeroEditModal heroData={heroData} onSave={d=>{setHeroData(d);setShowHeroEdit(false);setToastMsg("标题已更新 ✓")}} onClose={()=>setShowHeroEdit(false)}/>}
      {detailDest&&<DetailModal dest={detailDest} onClose={()=>setDetailDest(null)} onEdit={handleEdit} onDelete={handleDelete}/>}
      {noteDest&&<NoteDetailModal dest={noteDest} onSave={handleNoteSave} onClose={()=>setNoteDest(null)}/>}
      {showAddEdit&&<AddEditModal dest={editingDest} onSave={handleSave} onClose={()=>{setShowAddEdit(false);setEditingDest(null)}}/>}
      {viewer&&<ImageViewer images={viewer.images} startIndex={viewer.startIndex} onClose={()=>setViewer(null)}/>}
      {showGalleryMgr&&<GalleryManager data={travelData} onDeletePhoto={handleDeletePhoto} onAddPhotos={handleAddPhotos} onSetThumbnail={handleSetThumbnail} onClose={()=>setShowGalleryMgr(false)}/>}
      {showPickNote&&<PickDestModal data={travelData} onPick={handlePickNoteDest} onClose={()=>setShowPickNote(false)}/>}
      {toastMsg&&<Toast message={toastMsg} onDone={()=>setToastMsg(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
