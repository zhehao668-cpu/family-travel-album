<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>家庭旅游相册 — 我们的旅行足迹</title>

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

<style>
/* ============================================================
   CSS CUSTOM PROPERTIES & RESET
   ============================================================ */
:root {
  --cream: #FFF8F0;
  --cream-dark: #F5EDE0;
  --cream-darker: #EBE0D0;
  --gold: #D4A853;
  --gold-light: #E8CC7A;
  --gold-dark: #B8860B;
  --gold-pale: #F5E6C8;
  --amber: #C4953A;
  --text-primary: #2C2416;
  --text-secondary: #5C5242;
  --text-muted: #8A7E6E;
  --text-on-dark: #E8DCC8;
  --dark-bg: #1E1810;
  --dark-bg-alt: #282118;
  --white: #FFFFFF;
  --shadow-sm: 0 1px 3px rgba(44,36,22,0.06);
  --shadow-md: 0 4px 16px rgba(44,36,22,0.08);
  --shadow-lg: 0 12px 40px rgba(44,36,22,0.12);
  --shadow-xl: 0 24px 60px rgba(44,36,22,0.16);
  --radius-sm: 6px;
  --radius-md: 12px;
  --radius-lg: 20px;
  --radius-xl: 28px;
  --transition: 0.3s cubic-bezier(0.4,0,0.2,1);
  --transition-slow: 0.5s cubic-bezier(0.4,0,0.2,1);
  --font-serif: 'Noto Serif SC', 'Playfair Display', 'Cormorant Garamond', serif;
  --font-sans: 'Noto Sans SC', -apple-system, sans-serif;
  --max-width: 1440px;
  --navbar-height: 64px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html {
  scroll-behavior: smooth;
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  font-family: var(--font-sans);
  background: var(--cream);
  color: var(--text-primary);
  line-height: 1.7;
  overflow-x: hidden;
  min-height: 100vh;
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--cream-dark); }
::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--gold-dark); }

/* ============================================================
   NAVBAR — Frosted Glass
   ============================================================ */
.navbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--navbar-height);
  background: rgba(255,248,240,0.78);
  backdrop-filter: blur(20px) saturate(1.4);
  -webkit-backdrop-filter: blur(20px) saturate(1.4);
  border-bottom: 1px solid rgba(212,168,83,0.15);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: var(--transition);
}
.navbar.scrolled {
  box-shadow: var(--shadow-md);
  background: rgba(255,248,240,0.92);
}
.navbar-inner {
  width: 100%;
  max-width: var(--max-width);
  padding: 0 40px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.nav-logo {
  font-family: var(--font-serif);
  font-size: 1.35rem;
  font-weight: 700;
  color: var(--gold-dark);
  letter-spacing: 0.04em;
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}
.nav-logo .logo-icon {
  width: 34px; height: 34px;
  background: linear-gradient(135deg, var(--gold), var(--gold-dark));
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-size: 0.9rem;
}
.nav-links {
  display: flex;
  gap: 32px;
  list-style: none;
  align-items: center;
}
.nav-links a {
  font-family: var(--font-sans);
  font-size: 0.875rem;
  font-weight: 400;
  color: var(--text-secondary);
  text-decoration: none;
  letter-spacing: 0.02em;
  transition: var(--transition);
  position: relative;
  padding: 4px 0;
}
.nav-links a::after {
  content: '';
  position: absolute;
  bottom: -2px; left: 0; right: 0;
  height: 1.5px;
  background: var(--gold);
  transform: scaleX(0);
  transition: transform 0.3s ease;
}
.nav-links a:hover { color: var(--gold-dark); }
.nav-links a:hover::after { transform: scaleX(1); }
.nav-btn {
  padding: 8px 20px;
  background: linear-gradient(135deg, var(--gold), var(--gold-dark));
  color: #fff;
  border: none;
  border-radius: 20px;
  font-family: var(--font-sans);
  font-size: 0.8rem;
  cursor: pointer;
  transition: var(--transition);
  letter-spacing: 0.03em;
}
.nav-btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 16px rgba(184,134,11,0.3);
}

/* ============================================================
   HERO HEADER
   ============================================================ */
.hero {
  margin-top: var(--navbar-height);
  padding: 60px 40px 40px;
  text-align: center;
  max-width: var(--max-width);
  margin-left: auto;
  margin-right: auto;
}
.hero-eyebrow {
  font-family: var(--font-sans);
  font-size: 0.7rem;
  font-weight: 400;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 12px;
}
.hero h1 {
  font-family: var(--font-serif);
  font-size: 3rem;
  font-weight: 700;
  color: var(--text-primary);
  letter-spacing: 0.03em;
  margin-bottom: 12px;
  line-height: 1.25;
}
.hero-subtitle {
  font-family: var(--font-serif);
  font-size: 1.1rem;
  font-style: italic;
  color: var(--text-muted);
  font-weight: 400;
}
.hero-line {
  width: 60px;
  height: 2px;
  background: var(--gold);
  margin: 20px auto 0;
  border-radius: 1px;
}

/* ============================================================
   MAIN CONTENT — Three Column Layout
   ============================================================ */
.main-content {
  max-width: var(--max-width);
  margin: 0 auto;
  padding: 0 40px 60px;
  display: flex;
  gap: 0;
  position: relative;
  min-height: 700px;
}

/* ---- Timeline (Left) ---- */
.timeline-col {
  width: 90px;
  flex-shrink: 0;
  position: relative;
  padding-top: 20px;
}
.timeline-track {
  position: sticky;
  top: calc(var(--navbar-height) + 40px);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}
.timeline-line {
  position: absolute;
  top: 0; bottom: 0;
  left: 50%;
  width: 1.5px;
  background: linear-gradient(to bottom, var(--gold), var(--gold-pale), var(--gold));
  transform: translateX(-50%);
  border-radius: 1px;
}
.timeline-year {
  position: relative;
  z-index: 2;
  font-family: var(--font-serif);
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--gold-dark);
  cursor: pointer;
  padding: 10px 8px;
  transition: var(--transition);
  text-align: center;
  width: 100%;
  border-radius: var(--radius-sm);
  letter-spacing: 0.03em;
}
.timeline-year:hover {
  color: var(--gold-dark);
  background: rgba(212,168,83,0.08);
}
.timeline-year.active {
  color: #fff;
  background: var(--gold);
  border-radius: 20px;
}
.timeline-dot {
  width: 10px; height: 10px;
  background: var(--gold);
  border-radius: 50%;
  border: 2px solid var(--cream);
  box-shadow: 0 0 0 3px var(--gold-pale);
  flex-shrink: 0;
  transition: var(--transition);
}
.timeline-year.active .timeline-dot {
  background: var(--gold-dark);
  box-shadow: 0 0 0 6px rgba(212,168,83,0.2);
}
.timeline-trips {
  display: none;
  flex-direction: column;
  gap: 2px;
  margin-top: 4px;
}
.timeline-year.expanded .timeline-trips { display: flex; }
.timeline-trip {
  font-family: var(--font-sans);
  font-size: 0.68rem;
  color: var(--text-muted);
  cursor: pointer;
  padding: 3px 8px;
  border-radius: 10px;
  transition: var(--transition);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 80px;
  text-align: center;
}
.timeline-trip:hover {
  color: var(--gold-dark);
  background: rgba(212,168,83,0.06);
}

/* ---- Map Area (Center) ---- */
.map-col {
  flex: 1;
  min-width: 0;
  padding: 0 20px;
}
.map-wrapper {
  position: sticky;
  top: calc(var(--navbar-height) + 40px);
  height: 580px;
  border-radius: var(--radius-lg);
  overflow: hidden;
  box-shadow: var(--shadow-lg);
  border: 2px solid rgba(212,168,83,0.12);
  background: var(--cream-dark);
  transition: var(--transition);
}
.map-wrapper:hover {
  box-shadow: var(--shadow-xl);
  border-color: rgba(212,168,83,0.22);
}
#map {
  width: 100%;
  height: 100%;
}

/* Custom Leaflet Overrides */
.leaflet-container {
  background: var(--cream-dark) !important;
  font-family: var(--font-sans) !important;
}
.leaflet-popup-content-wrapper {
  border-radius: var(--radius-md) !important;
  box-shadow: var(--shadow-lg) !important;
  border: 1px solid rgba(212,168,83,0.15) !important;
  padding: 0 !important;
  overflow: hidden;
}
.leaflet-popup-content {
  margin: 0 !important;
  font-family: var(--font-sans) !important;
  min-width: 220px;
}
.leaflet-popup-close-button {
  color: var(--text-secondary) !important;
  padding: 8px !important;
  z-index: 10;
}

/* Pulse Marker */
.pulse-marker {
  width: 18px; height: 18px;
  background: var(--gold);
  border-radius: 50%;
  border: 3px solid #fff;
  box-shadow: 0 2px 8px rgba(184,134,11,0.4);
  position: relative;
  transition: transform 0.2s ease;
}
.pulse-marker::before {
  content: '';
  position: absolute;
  top: -8px; left: -8px;
  width: 28px; height: 28px;
  border-radius: 50%;
  border: 2px solid rgba(212,168,83,0.5);
  animation: pulse-ring 2s ease-out infinite;
}
.pulse-marker.active {
  background: var(--gold-dark);
  transform: scale(1.3);
  border-color: #fff;
  box-shadow: 0 4px 16px rgba(184,134,11,0.6);
}
.pulse-marker.active::before {
  border-color: rgba(184,134,11,0.6);
  animation-duration: 1.2s;
}
@keyframes pulse-ring {
  0% { transform: scale(0.8); opacity: 1; }
  100% { transform: scale(2.2); opacity: 0; }
}

/* Map Popup Card */
.map-popup-card {
  padding: 0;
}
.map-popup-card img {
  width: 100%;
  height: 120px;
  object-fit: cover;
  display: block;
}
.map-popup-card .popup-body {
  padding: 12px 14px;
}
.map-popup-card h4 {
  font-family: var(--font-serif);
  font-size: 0.95rem;
  color: var(--text-primary);
  margin-bottom: 2px;
}
.map-popup-card .popup-loc {
  font-size: 0.7rem;
  color: var(--gold-dark);
  font-weight: 500;
  margin-bottom: 4px;
}
.map-popup-card .popup-date {
  font-size: 0.7rem;
  color: var(--text-muted);
}

/* ---- Side Panel (Right) ---- */
.side-panel {
  width: 380px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.side-panel-header {
  position: sticky;
  top: calc(var(--navbar-height) + 40px);
  background: rgba(255,248,240,0.9);
  backdrop-filter: blur(12px);
  z-index: 5;
  padding-bottom: 4px;
}
.side-panel-title {
  font-family: var(--font-serif);
  font-size: 1.15rem;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 10px;
  letter-spacing: 0.02em;
}
.tag-filters {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 2px;
}
.tag-pill {
  padding: 4px 14px;
  border-radius: 14px;
  font-size: 0.7rem;
  font-weight: 400;
  border: 1px solid rgba(212,168,83,0.25);
  background: transparent;
  color: var(--text-secondary);
  cursor: pointer;
  transition: var(--transition);
  letter-spacing: 0.02em;
  white-space: nowrap;
}
.tag-pill:hover {
  border-color: var(--gold);
  color: var(--gold-dark);
}
.tag-pill.active {
  background: var(--gold);
  border-color: var(--gold);
  color: #fff;
}
.side-panel-actions {
  display: flex;
  gap: 8px;
  margin-top: 4px;
}
.btn-add {
  flex: 1;
  padding: 10px;
  border-radius: var(--radius-sm);
  border: 1.5px dashed rgba(212,168,83,0.4);
  background: transparent;
  color: var(--gold-dark);
  font-family: var(--font-sans);
  font-size: 0.78rem;
  cursor: pointer;
  transition: var(--transition);
  letter-spacing: 0.03em;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.btn-add:hover {
  background: rgba(212,168,83,0.06);
  border-color: var(--gold);
}
.btn-export {
  padding: 10px 16px;
  border-radius: var(--radius-sm);
  border: 1px solid rgba(212,168,83,0.2);
  background: transparent;
  color: var(--text-muted);
  font-family: var(--font-sans);
  font-size: 0.73rem;
  cursor: pointer;
  transition: var(--transition);
  white-space: nowrap;
}
.btn-export:hover { color: var(--gold-dark); border-color: var(--gold); }

.cards-list {
  display: flex;
  flex-direction: column;
  gap: 14px;
  max-height: calc(100vh - 340px);
  overflow-y: auto;
  padding-right: 4px;
}

/* Destination Card */
.dest-card {
  background: var(--white);
  border-radius: var(--radius-md);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
  border: 1px solid rgba(212,168,83,0.08);
  transition: var(--transition);
  cursor: pointer;
  position: relative;
}
.dest-card:hover {
  box-shadow: var(--shadow-md);
  transform: translateY(-2px);
  border-color: rgba(212,168,83,0.2);
}
.dest-card.active {
  border-color: var(--gold);
  box-shadow: 0 0 0 3px rgba(212,168,83,0.12), var(--shadow-md);
}
.dest-card .card-thumb-area {
  position: relative;
  height: 140px;
  overflow: hidden;
}
.dest-card .card-thumb-area img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.6s ease;
}
.dest-card:hover .card-thumb-area img {
  transform: scale(1.05);
}
.dest-card .card-thumb-nav {
  position: absolute;
  bottom: 8px;
  right: 8px;
  display: flex;
  gap: 3px;
}
.dest-card .thumb-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: rgba(255,255,255,0.5);
  transition: var(--transition);
}
.dest-card .thumb-dot.active {
  background: #fff;
  width: 16px;
  border-radius: 3px;
}
.dest-card .card-arrow {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 28px; height: 28px;
  border-radius: 50%;
  background: rgba(255,255,255,0.85);
  border: none;
  cursor: pointer;
  font-size: 0.7rem;
  color: var(--text-secondary);
  display: none;
  align-items: center;
  justify-content: center;
  transition: var(--transition);
  z-index: 2;
}
.dest-card:hover .card-arrow { display: flex; }
.dest-card .card-arrow:hover { background: #fff; color: var(--gold-dark); }
.dest-card .card-arrow.left { left: 6px; }
.dest-card .card-arrow.right { right: 6px; }

.dest-card .card-body {
  padding: 14px 16px;
}
.dest-card .card-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 6px;
}
.dest-card .card-title {
  font-family: var(--font-serif);
  font-size: 0.95rem;
  font-weight: 600;
  color: var(--text-primary);
  letter-spacing: 0.02em;
}
.dest-card .card-location {
  font-size: 0.7rem;
  color: var(--gold);
  font-weight: 500;
}
.dest-card .card-meta {
  display: flex;
  gap: 16px;
  font-size: 0.7rem;
  color: var(--text-muted);
  margin-bottom: 4px;
}
.dest-card .card-meta span { display: flex; align-items: center; gap: 4px; }
.dest-card .card-note {
  font-size: 0.75rem;
  color: var(--text-secondary);
  line-height: 1.5;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  margin-top: 6px;
}
.dest-card .card-actions {
  display: flex;
  gap: 6px;
  margin-top: 10px;
}
.dest-card .card-action-btn {
  padding: 4px 12px;
  border-radius: 12px;
  border: 1px solid rgba(212,168,83,0.15);
  background: transparent;
  font-size: 0.68rem;
  color: var(--text-muted);
  cursor: pointer;
  transition: var(--transition);
  font-family: var(--font-sans);
}
.dest-card .card-action-btn:hover {
  border-color: var(--gold);
  color: var(--gold-dark);
}
.dest-card .card-action-btn.danger:hover {
  border-color: #d4756b;
  color: #d4756b;
}

/* ============================================================
   SUMMARY BAR (Dark Section)
   ============================================================ */
.summary-bar {
  background: var(--dark-bg);
  color: var(--text-on-dark);
  padding: 70px 40px 60px;
}
.summary-bar-inner {
  max-width: var(--max-width);
  margin: 0 auto;
}

/* Stats Row */
.stats-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 40px;
  margin-bottom: 60px;
  text-align: center;
}
.stat-item {
  padding: 30px 20px;
}
.stat-number {
  font-family: var(--font-serif);
  font-size: 3rem;
  font-weight: 700;
  color: var(--gold-light);
  line-height: 1.1;
  margin-bottom: 4px;
}
.stat-number .unit {
  font-size: 1.2rem;
  font-weight: 400;
  color: var(--gold);
}
.stat-label {
  font-size: 0.82rem;
  color: var(--text-muted);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-bottom: 10px;
}
.stat-detail {
  font-size: 0.72rem;
  color: rgba(232,220,200,0.5);
  line-height: 1.6;
}

/* Waterfall Gallery */
.gallery-section-title {
  font-family: var(--font-serif);
  font-size: 1.5rem;
  color: var(--gold-light);
  text-align: center;
  margin-bottom: 8px;
  letter-spacing: 0.03em;
}
.gallery-section-sub {
  text-align: center;
  font-size: 0.78rem;
  color: var(--text-muted);
  margin-bottom: 36px;
}
.waterfall-gallery {
  columns: 4;
  column-gap: 16px;
  margin-bottom: 60px;
}
.waterfall-item {
  break-inside: avoid;
  margin-bottom: 16px;
  border-radius: var(--radius-sm);
  overflow: hidden;
  position: relative;
  cursor: pointer;
  transition: var(--transition);
}
.waterfall-item img {
  width: 100%;
  display: block;
  transition: transform 0.6s ease;
}
.waterfall-item:hover img {
  transform: scale(1.06);
}
.waterfall-item .waterfall-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(30,24,16,0.85) 0%, transparent 60%);
  opacity: 0;
  transition: var(--transition);
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 16px;
}
.waterfall-item:hover .waterfall-overlay {
  opacity: 1;
}
.waterfall-overlay .wf-location {
  font-family: var(--font-serif);
  font-size: 0.9rem;
  font-weight: 600;
  color: #fff;
}
.waterfall-overlay .wf-date {
  font-size: 0.7rem;
  color: var(--gold-light);
}

/* Travel Notes */
.notes-section-title {
  font-family: var(--font-serif);
  font-size: 1.5rem;
  color: var(--gold-light);
  text-align: center;
  margin-bottom: 8px;
  letter-spacing: 0.03em;
}
.notes-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 24px;
}
.note-card {
  background: var(--dark-bg-alt);
  border-radius: var(--radius-md);
  padding: 24px;
  border: 1px solid rgba(212,168,83,0.08);
  transition: var(--transition);
  cursor: pointer;
}
.note-card:hover {
  border-color: rgba(212,168,83,0.2);
  transform: translateY(-2px);
}
.note-card .note-date {
  font-size: 0.7rem;
  color: var(--gold);
  letter-spacing: 0.05em;
  margin-bottom: 6px;
}
.note-card .note-title {
  font-family: var(--font-serif);
  font-size: 1rem;
  color: var(--text-on-dark);
  margin-bottom: 8px;
}
.note-card .note-excerpt {
  font-size: 0.75rem;

// ============================================================
// CUSTOM HOOK: useLocalStorage
// ============================================================
function useLocalStorage(key, initialValue) {
  const [value, setValue] = useState(() => {
    try {
      const saved = localStorage.getItem(key);
      return saved ? JSON.parse(saved) : initialValue;
    } catch { return initialValue; }
  });

  useEffect(() => {
    try {
      localStorage.setItem(key, JSON.stringify(value));
    } catch {}
  }, [key, value]);

  return [value, setValue];
}

// ============================================================
// UTILITY FUNCTIONS
// ============================================================
function formatDate(dateStr) {
  if (!dateStr) return "";
  const d = new Date(dateStr);
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,"0")}.${String(d.getDate()).padStart(2,"0")}`;
}

function formatCost(n) {
  if (n >= 10000) return (n/10000).toFixed(1) + "万";
  if (n >= 1000) return (n/1000).toFixed(1) + "k";
  return String(n);
}

// ============================================================
// TOAST COMPONENT
// ============================================================
function Toast({ message, onDone }) {
  useEffect(() => {
    const t = setTimeout(onDone, 2800);
    return () => clearTimeout(t);
  }, [onDone]);
  return <div className="toast">{message}</div>;
}

function Timeline({ data, selectedYear, onYearClick, onTripClick }) {

          return (
            <div key={year} className={`timeline-year${isExpanded?" expanded":""}${isActive?" active":""}`}>
              <span className="timeline-dot"></span>

        })}

// ============================================================
// MAP VIEW
// ============================================================
function MapView({ data, activeId, filteredIds, onMarkerClick }) {
  const mapContainerRef = useRef(null);
  const mapInstanceRef = useRef(null);
  const markersRef = useRef({});
  const popupRef = useRef(null);

  // Init map
  useEffect(() => {
    if (!mapContainerRef.current) return;
    const map = L.map(mapContainerRef.current, {
      center: [33.5, 107],
      zoom: 5,
      zoomControl: true,
      scrollWheelZoom: true,
      attributionControl: false
    });

    L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png", {
      maxZoom: 18,
      minZoom: 3
    }).addTo(map);

    // Add minimalist attribution
    L.control.attribution({position:"bottomleft",prefix:""}).addTo(map);

    mapInstanceRef.current = map;

    // Resize handler
    const ro = new ResizeObserver(() => { map.invalidateSize(); });
    ro.observe(mapContainerRef.current);

    return () => {
      ro.disconnect();
      map.remove();
      mapInstanceRef.current = null;
    };
  }, []);

  // Update markers
  useEffect(() => {
    const map = mapInstanceRef.current;
    if (!map) return;

    // Clear old markers
    Object.values(markersRef.current).forEach(m => m.remove());
    markersRef.current = {};

    const filteredData = filteredIds ? data.filter(d => filteredIds.has(d.id)) : data;

    filteredData.forEach(dest => {
      const isActive = dest.id === activeId;
      const icon = L.divIcon({
        className: "custom-marker-container",
        html: `<div class="pulse-marker${isActive?" active":""}"></div>`,
        iconSize: [34, 34],
        iconAnchor: [17, 17],
        popupAnchor: [0, -20]
      });

      const marker = L.marker(dest.coordinates, { icon }).addTo(map);

      const popupContent = `
        <div class="map-popup-card">
          <img src="${dest.thumbnail}" alt="${dest.placeName}" onerror="this.style.display='none'"/>
          <div class="popup-body">
            <h4>${dest.placeName}</h4>
            <div class="popup-loc">${dest.province} · ${dest.city}</div>
            <div class="popup-date">${formatDate(dest.startDate)}${dest.endDate!==dest.startDate?" — "+formatDate(dest.endDate):""}</div>
          </div>
        </div>
      `;
      marker.bindPopup(popupContent, { maxWidth: 260, closeButton: true, className:"custom-popup" });

      marker.on("click", () => {
        onMarkerClick(dest.id);
      });

      marker.on("mouseover", function() {
        if (!this.getPopup().isOpen()) this.openPopup();
      });

      markersRef.current[dest.id] = marker;
    });
  }, [data, activeId, filteredIds, onMarkerClick]);

  // Fly to active marker
  useEffect(() => {
    const map = mapInstanceRef.current;
    if (!map || !activeId) return;
    const dest = data.find(d => d.id === activeId);
    if (!dest) return;
    map.flyTo(dest.coordinates, 12, { duration: 1.2 });
    const marker = markersRef.current[activeId];
    if (marker && !marker.getPopup().isOpen()) {
      setTimeout(() => marker.openPopup(), 800);
    }
  }, [activeId, data]);

  return <div className="map-col" id="map-section">
    <div className="map-wrapper"><div id="map" ref={mapContainerRef}></div></div>
  </div>;
}

function SidePanel({ data, activeId, onSelect, onAdd, onEdit, onDelete, onPhotoClick, onExport }) {
  const [activeTags, setActiveTags] = useState([]);

  const allTags = useMemo(() => {
    const tags = new Set();
    data.forEach(d => d.tags.forEach(t => tags.add(t)));
    return [...tags].sort();
  }, [data]);

  const filteredData = useMemo(() => {
    if (activeTags.length === 0) return data;
    return data.filter(d => d.tags.some(t => activeTags.includes(t)));
  }, [data, activeTags]);

  const toggleTag = (tag) => {
    setActiveTags(prev => prev.includes(tag) ? prev.filter(t=>t!==tag) : [...prev, tag]);
  };

  return (
    <div className="side-panel">
      <div className="side-panel-header">
        <div className="side-panel-title">旅行目的地</div>
        <div className="tag-filters">
          {allTags.map(tag => (
            <button key={tag} className={`tag-pill${activeTags.includes(tag)?" active":""}`} onClick={()=>toggleTag(tag)}>
              {tag}
            </button>
          ))}
          {activeTags.length > 0 && (
            <button className="tag-pill" style={{borderStyle:"solid",color:"var(--text-muted)"}} onClick={()=>setActiveTags([])}>
              清除筛选
            </button>
          )}
        </div>
        <div className="side-panel-actions">
          <button className="btn-add" onClick={onAdd}>+ 新增目的地</button>
          <button className="btn-export" onClick={onExport} title="导出 JSON 数据备份">⬇ 导出数据</button>
        </div>
      </div>
      <div className="cards-list">
        {filteredData.map(dest => (
          <DestinationCard
            key={dest.id}
            dest={dest}
            isActive={dest.id === activeId}
            onClick={onSelect}
            onEdit={onEdit}
            onDelete={onDelete}
            onPhotoClick={onPhotoClick}
          />
        ))}
        {filteredData.length === 0 && (
          <div style={{textAlign:"center",padding:40,color:"var(--text-muted)",fontSize:"0.8rem"}}>
            没有匹配的旅行目的地
          </div>
        )}
      </div>
    </div>
  );
}

function Footer({ onExport, onImport }) {
  const fileRef = useRef(null);

  const handleImport = () => {
    const file = fileRef.current?.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = JSON.parse(e.target.result);
        if (Array.isArray(data)) {
          onImport(data);
        } else {
          alert("无效的数据格式，请导入包含旅行数据数组的 JSON 文件。");
        }
      } catch {
        alert("JSON 解析失败，请检查文件格式。");
      }
    };
    reader.readAsText(file);
  };

  return (
    <footer className="footer">
      <div className="footer-inner">
        <p className="footer-text">© 2025 家庭旅行相册 · 用心记录每一段旅程</p>
        <div className="footer-links">
          <button onClick={onExport}>⬇ JSON 备份导出</button>
          <label style={{cursor:"pointer",fontSize:"0.73rem",color:"var(--text-muted)",transition:"var(--transition)"}}
            onMouseEnter={e=>e.target.style.color="var(--gold-light)"}
            onMouseLeave={e=>e.target.style.color="var(--text-muted)"}>
            ⬆ 导入数据恢复
            <input type="file" accept=".json" ref={fileRef} onChange={handleImport} style={{display:"none"}}/>
          </label>
        </div>
      </div>
    </footer>
  );
}

function ImageViewer({ images, startIndex, onClose }) {
  const [index, setIndex] = useState(startIndex || 0);
  const validImages = useMemo(() => images.filter(Boolean), [images]);

  useEffect(() => {
    const onKey = (e) => {
      if (e.key === "Escape") onClose();
      if (e.key === "ArrowLeft") setIndex(i=>(i-1+validImages.length)%validImages.length);
      if (e.key === "ArrowRight") setIndex(i=>(i+1)%validImages.length);
    };
    window.addEventListener("keydown", onKey);
    document.body.style.overflow = "hidden";
    return () => {
      window.removeEventListener("keydown", onKey);
      document.body.style.overflow = "";
    };
  }, [onClose, validImages.length]);

  if (validImages.length === 0) return null;

  return (
    <div className="image-viewer-overlay" onClick={onClose}>
      <button className="viewer-close" onClick={onClose}>✕</button>
      <div className="viewer-info">{index+1} / {validImages.length}</div>
      <div className="viewer-main" onClick={e=>e.stopPropagation()}>
        <button className="viewer-nav prev" onClick={()=>setIndex(i=>(i-1+validImages.length)%validImages.length)}>‹</button>
        <img key={index} src={validImages[index]} alt="" onError={(e)=>{e.target.style.display="none"}}/>
        <button className="viewer-nav next" onClick={()=>setIndex(i=>(i+1)%validImages.length)}>›</button>
      </div>
      <div className="viewer-thumbnails" onClick={e=>e.stopPropagation()}>
        {validImages.map((img,i)=>(
          <div key={i} className={`viewer-thumb${i===index?" active":""}`} onClick={()=>setIndex(i)}>
            <img src={img} alt="" onError={(e)=>{e.target.style.display="none"}}/>
          </div>
        ))}
      </div>
    </div>
  );
}

    setShowModal(true);
  };

  const handleEdit = (dest) => {
    setEditingDest(dest);
    setShowModal(true);
  };

  const handleDelete = (id) => {
    if (!window.confirm("确定要删除这条旅行记录吗？此操作不可撤销。")) return;
    setTravelData(prev => prev.filter(d=>d.id!==id));
    if (activeId === id) setActiveId(null);
    setToastMsg("已删除旅行记录");
  };

  const handleSave = (data) => {
    if (editingDest) {
      setTravelData(prev => prev.map(d=>d.id===data.id?data:d));
      setToastMsg("旅行记录已更新 ✓");
    } else {
      setTravelData(prev => [data, ...prev]);
      setToastMsg("旅行记录已添加 ✓");
    }
    setShowModal(false);
    setEditingDest(null);
    if (data.id) setActiveId(data.id);
  };

  const handleExport = () => {
    const blob = new Blob([JSON.stringify(travelData, null, 2)], {type:"application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `family-travel-backup-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
    setToastMsg("数据已导出 ✓");
  };

  const handleImport = (data) => {
    if (window.confirm(`即将导入 ${data.length} 条旅行记录，当前数据将被覆盖。确认继续？`)) {
      setTravelData(data);
      setActiveId(null);
      setSelectedYear(null);
      setToastMsg(`成功导入 ${data.length} 条旅行记录 ✓`);
    }
  };

  const handlePhotoClick = (images, startIdx) => {
    setViewer({images, startIndex: startIdx||0});
  };

  return (
    <div>
      <Navbar onExport={handleExport} onAdd={handleAdd} />
      <Hero
        totalDestinations={travelData.length}
        totalDays={travelData.reduce((s,d)=>s+(d.days||0),0)}
        totalCost={travelData.reduce((s,d)=>s+(d.cost||0),0)}
      />

      <div className="main-content">
        <Timeline
          data={travelData}
          selectedYear={selectedYear}
          onYearClick={handleYearClick}
          onTripClick={handleTripClick}
        />

        <MapView
          data={travelData}
          activeId={activeId}
          filteredIds={filteredMapIds}
          onMarkerClick={handleMarkerClick}
        />

        <SidePanel
          data={travelData}
          activeId={activeId}
          onSelect={handleSelectCard}
          onAdd={handleAdd}
          onEdit={handleEdit}
          onDelete={handleDelete}
          onPhotoClick={handlePhotoClick}
          onExport={handleExport}
        />
      </div>

      <SummaryBar data={travelData} onPhotoClick={handlePhotoClick} />
      <Footer onExport={handleExport} onImport={handleImport} />

      {showModal && (
        <AddEditModal
          dest={editingDest}
          onSave={handleSave}
          onClose={()=>{setShowModal(false);setEditingDest(null);}}
        />
      )}

      {viewer && (
        <ImageViewer
          images={viewer.images}
          startIndex={viewer.startIndex}
          onClose={()=>setViewer(null)}
        />
      )}

      {toastMsg && <Toast message={toastMsg} onDone={()=>setToastMsg(null)}/>}
    </div>
  );
}

// ============================================================
// RENDER
// ============================================================
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
