          <div style={{maxHeight:"55vh",overflowY:"auto"}}>
            {sorted.length===0&&<div style={{textAlign:"center",padding:40,color:"var(--text-muted)"}}>暂无目的地记录，点击"新增"开始记录吧 ✈️</div>}
            {sorted.map(d=>{
              const visitCount=d.visits?.length||1;
              return(
                <div key={d.id} className="dest-mgr-item" style={{display:"flex",alignItems:"center",gap:12,padding:"10px 8px",borderBottom:"1px solid var(--cream-darker)",transition:"var(--transition)",borderRadius:"var(--radius-sm)"}}>
                  <div style={{width:56,height:42,borderRadius:"var(--radius-sm)",overflow:"hidden",flexShrink:0,background:"var(--cream-dark)"}}>
                    {d.thumbnail&&<img src={d.thumbnail} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}} onError={e=>{e.target.style.display="none"}}/>}
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:600,fontSize:"0.85rem",color:"var(--text-primary)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{d.placeName}</div>
                    <div style={{fontSize:"0.68rem",color:"var(--text-muted)"}}>{d.province}·{d.city} · {formatDate(d.startDate)}{visitCount>1?<span style={{color:"var(--gold-dark)",marginLeft:4}}>（{visitCount}次旅行）</span>:""}</div>
                  </div>
                  <div style={{display:"flex",gap:6,flexShrink:0}}>
                    <button className="detail-btn primary" style={{padding:"5px 12px",fontSize:"0.68rem"}} onClick={()=>onEdit(d)}>✎ 编辑</button>
                    <button className="detail-btn danger" style={{padding:"5px 10px",fontSize:"0.68rem"}} onClick={()=>{if(window.confirm("确定删除「"+d.placeName+"」吗？"))onDelete(d.id)}}>✕</button>
                  </div>
                </div>
              );
            })}
          </div>
          <div className="form-actions" style={{marginTop:12}}><button className="detail-btn ghost" onClick={onClose}>关闭</button></div>
        </div>
      </div>
    </div>
  );
}

// ============================================================
// ☁️ 百度网盘云同步 — OAuth授权 + 数据上传/下载 + 自动同步
//   - useBaiduCloud() hook: token管理、OAuth回调处理、文件上传下载
//   - BaiduPanel 组件: 网盘连接按钮 + 下拉菜单(同步/断开)
// ============================================================
const BAIDU_APP_KEY = 'cUaiYH4s50dOBqLwFDVvjw0PPRWgU5OZ';
const BAIDU_REDIRECT_URI = 'https://zhehao668-cpu.github.io/family-travel-album/';
const PROXY_URL = 'https://travel-baidu-proxy.zhehao668-travel.workers.dev';
const BAIDU_SCOPE = 'basic,netdisk';

function base64URL(v){return btoa(String.fromCharCode(...new Uint8Array(v))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'')}
function generateVerifier(){const a=new Uint8Array(48);crypto.getRandomValues(a);return base64URL(a)}
async function generateChallenge(verifier){const e=new TextEncoder();const d=await crypto.subtle.digest('SHA-256',e.encode(verifier));return base64URL(d)}

// --- useBaiduCloud Hook: 管理百度网盘 OAuth token + 数据上传/下载 ---
function useBaiduCloud(){
  const[token,setToken]=useState(()=>{try{return JSON.parse(sessionStorage.getItem('baidu_token'))}catch{return null}});
  const[user,setUser]=useState(()=>{try{return JSON.parse(sessionStorage.getItem('baidu_user'))}catch{return null}});
  const[syncing,setSyncing]=useState(false);
  const[authError,setAuthError]=useState(null);

  // Process OAuth callback
  useEffect(()=>{
    const p=new URLSearchParams(window.location.search);
    const code=p.get('code');const state=p.get('state');
    const err=p.get('error');const errDesc=p.get('error_description');
    // Baidu returned an error
    if(err){setAuthError(errDesc||err);console.error('Baidu OAuth error:',err,errDesc);window.history.replaceState({},'',window.location.pathname);return}
    if(!code||!state)return;
    const saved=sessionStorage.getItem('baidu_state');
    if(state!==saved){setAuthError('state 不匹配，可能被重放攻击');console.error('State mismatch:',state,saved);sessionStorage.removeItem('baidu_state');sessionStorage.removeItem('baidu_verifier');window.history.replaceState({},'',window.location.pathname);return}
    const verifier=sessionStorage.getItem('baidu_verifier');if(!verifier){setAuthError('缺少 code_verifier');return}
    (async()=>{try{
      const body=new URLSearchParams({grant_type:'authorization_code',code,client_id:BAIDU_APP_KEY,redirect_uri:BAIDU_REDIRECT_URI,code_verifier:verifier});
      const r=await fetch(`${PROXY_URL}/openapi.baidu.com/oauth/2.0/token`,{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:body.toString()});
      const d=await r.json();
      console.log('Baidu token response:',d);
      if(d.access_token){setToken(d);sessionStorage.setItem('baidu_token',JSON.stringify(d));setAuthError(null);
        const ur=await fetch(`${PROXY_URL}/pan.baidu.com/rest/2.0/xpan/nas?method=uinfo&access_token=${d.access_token}`);
        const ud=await ur.json();console.log('Baidu user info:',ud);if(ud.errno===0){setUser(ud);sessionStorage.setItem('baidu_user',JSON.stringify(ud))}
      }else{setAuthError(d.error_description||d.error||'换取token失败')}
      sessionStorage.removeItem('baidu_state');sessionStorage.removeItem('baidu_verifier');
      window.history.replaceState({},'',window.location.pathname);
    }catch(e){console.error('Baidu auth error:',e);setAuthError('网络错误：'+e.message)}})()
  },[]);

  const login=async()=>{setAuthError(null);const verifier=generateVerifier();const challenge=await generateChallenge(verifier);const state=base64URL(crypto.getRandomValues(new Uint8Array(16)));sessionStorage.setItem('baidu_verifier',verifier);sessionStorage.setItem('baidu_state',state);const authUrl=`https://openapi.baidu.com/oauth/2.0/authorize?response_type=code&client_id=${BAIDU_APP_KEY}&redirect_uri=${encodeURIComponent(BAIDU_REDIRECT_URI)}&scope=${BAIDU_SCOPE}&code_challenge=${challenge}&code_challenge_method=S256&state=${state}&display=page`;window.location.href=authUrl};

  const logout=()=>{setToken(null);setUser(null);sessionStorage.removeItem('baidu_token');sessionStorage.removeItem('baidu_user');setAuthError(null)};

  const apiCall=async(path,method,body)=>{const h={'Content-Type':'application/x-www-form-urlencoded'};const url=`${PROXY_URL}/${path}${path.includes('?')?'&':'?'}access_token=${token.access_token}`;const opts={method,headers:h};if(body)opts.body=body instanceof URLSearchParams?body.toString():body;const r=await fetch(url,opts);return r.json()};

  const uploadFile=async(fileName,base64Data,folder='/apps/family-travel')=>{setSyncing(true);try{
    const raw=base64Data.includes('base64,')?base64Data.split('base64,')[1]:base64Data;
    const byteChars=atob(raw);const bytes=new Uint8Array(byteChars.length);for(let i=0;i<byteChars.length;i++)bytes[i]=byteChars.charCodeAt(i);
    const blob=new Blob([bytes],{type:'image/jpeg'});
    const path=folder+'/'+fileName;
    const fd=new FormData();fd.append('file',blob,fileName);fd.append('path',path);fd.append('ondup','overwrite');
    const r=await fetch(`${PROXY_URL}/pan.baidu.com/rest/2.0/xpan/file?method=upload&access_token=${token.access_token}&path=${encodeURIComponent(path)}&ondup=overwrite`,{method:'POST',body:fd});
    const d=await r.json();setSyncing(false);return d;
  }catch(e){setSyncing(false);throw e}};

  // Cloud data sync: save travelData as JSON to Baidu Netdisk
  const saveData=async(travelData,heroData,customTags)=>{if(!token)return;setSyncing(true);try{
    const payload=JSON.stringify({travelData,heroData,customTags,updatedAt:new Date().toISOString()});
    const blob=new Blob([payload],{type:'application/json'});
    const path='/apps/family-travel/family-travel-data.json';
    const fd=new FormData();fd.append('file',blob,'data.json');fd.append('path',path);fd.append('ondup','overwrite');
    const r=await fetch(`${PROXY_URL}/pan.baidu.com/rest/2.0/xpan/file?method=upload&access_token=${token.access_token}&path=${encodeURIComponent(path)}&ondup=overwrite`,{method:'POST',body:fd});
    const d=await r.json();setSyncing(false);
    if(d.errno===0)console.log('Cloud sync OK:',new Date().toLocaleTimeString());else console.error('Cloud sync failed:',d);
    return d;
  }catch(e){setSyncing(false);console.error('Cloud sync error:',e)}};

  // Load data from cloud
  const loadData=async()=>{if(!token)return null;try{
    const path='/apps/family-travel/family-travel-data.json';
    const r=await fetch(`${PROXY_URL}/pan.baidu.com/rest/2.0/xpan/multimedia?method=filemetas&access_token=${token.access_token}&path=${encodeURIComponent(path)}&dlink=1`);
    const meta=await r.json();
    if(meta.errno!==0||!meta.list||meta.list.length===0){console.log('No cloud data found, starting fresh');return null}
    const dlink=meta.list[0].dlink;if(!dlink)return null;
    const dr=await fetch(dlink);const data=await dr.json();
    console.log('Cloud data loaded:',data.updatedAt||'unknown date');
    return data;
  }catch(e){console.error('Cloud load error:',e);return null}};

  return{token,user,login,logout,apiCall,uploadFile,saveData,loadData,syncing,authError};
}

// --- BaiduPanel UI: 网盘连接按钮 + 下拉菜单（同步/断开） ---
function BaiduPanel({token,user,login,logout,syncing,onToast,authError,onSyncNow}){
  const[showMenu,setShowMenu]=useState(false);
  const connected=!!token;
  return(
    <div className="baidu-panel" style={{position:'relative'}}>
      <button className={`baidu-btn${connected?' connected':''}`} onClick={()=>connected?setShowMenu(s=>!s):login()} title={connected?'百度网盘已连接':authError?`错误: ${authError}`:'连接百度网盘'}>
        <span className={`baidu-status${connected?' on':''}`} style={authError?{background:'#d4756b'}:{}}></span>
        {syncing?`☁️ 同步中…`:connected?`☁️ ${user?.baidu_name||'已连接'}`:authError?`☁️ 连接失败 (点击重试)`:'☁️ 连接网盘'}
      </button>
      {connected&&(
        <div className={`cloud-actions${showMenu?' show':''}`}>
          <button onClick={()=>{onSyncNow();setShowMenu(false)}}>🔄 立即同步数据</button>
          <button onClick={()=>{logout();setShowMenu(false)}}>断开连接</button>
        </div>
      )}
    </div>
  );
}

// ============================================================
// ⬆ BackToTop 回到顶部 — 滚动超过400px显示，点击平滑滚动到顶部
// ============================================================
function BackToTop(){
  const[visible,setVisible]=useState(false);
  useEffect(()=>{const h=()=>setVisible(window.scrollY>400);window.addEventListener("scroll",h,{passive:true});return()=>window.removeEventListener("scroll",h)},[]);
  const scrollTop=()=>{window.scrollTo({top:0,behavior:"smooth"})};
  return <button className={`back-to-top${visible?" visible":""}`} onClick={scrollTop} title="回到顶部" aria-label="回到顶部">↑</button>;
}

// ============================================================
// 🎯 App 主组件 — 所有状态的中央管理者
//   - travelData/heroData/customTags: 通过 useLocalStorage 持久化到浏览器
//   - 云同步: 百度网盘连接后优先加载云端数据，变更后3秒自动上传
//   - 所有增删改查的 handler 在这里定义，向下传递给子组件
// ============================================================
function App(){
  const[travelData,setTravelData]=useLocalStorage("familyTravelData_v2",defaultTravelData);
  const[heroData,setHeroData]=useLocalStorage("familyHeroData_v2",{title:"我们的旅行足迹",subtitle:"每一段旅程，都是家的延伸"});
  const[customTags,setCustomTags]=useLocalStorage("familyCustomTags_v2",[]);
  const[toastMsg,setToastMsg]=useState(null);
  const baidu=useBaiduCloud();
  const[cloudLoaded,setCloudLoaded]=useState(false);
  const[activeId,setActiveId]=useState(null);

  // On mount: if connected to Baidu, load cloud data (takes precedence over localStorage)
  useEffect(()=>{if(!baidu.token||cloudLoaded)return;
    (async()=>{try{const cloud=await baidu.loadData();if(cloud&&cloud.travelData&&Array.isArray(cloud.travelData)){setTravelData(cloud.travelData);if(cloud.heroData)setHeroData(cloud.heroData);if(cloud.customTags)setCustomTags(cloud.customTags);setToastMsg('已从百度网盘加载 '+cloud.travelData.length+' 条记录 ✓')};setCloudLoaded(true)}catch(e){setCloudLoaded(true);console.error('Cloud load error:',e)}})()
  },[baidu.token]);

  // Auto-save to cloud on data changes (debounced 3 seconds)
  useEffect(()=>{if(!baidu.token||!cloudLoaded)return;const t=setTimeout(()=>{baidu.saveData(travelData,heroData,customTags)},3000);return()=>clearTimeout(t)},[travelData,heroData,customTags,baidu.token,cloudLoaded]);

  const syncNow=()=>{if(!baidu.token)return;baidu.saveData(travelData,heroData,customTags).then(()=>setToastMsg('数据已同步到百度网盘 ✓'))};
  const handleBaiduLogout=()=>{baidu.logout();setCloudLoaded(false)};
  const[selectedYear,setSelectedYear]=useState(null);
  const[showAddEdit,setShowAddEdit]=useState(false);
  const[editingDest,setEditingDest]=useState(null);
  const[detailDest,setDetailDest]=useState(null);
  const[noteDest,setNoteDest]=useState(null);
  const[showHeroEdit,setShowHeroEdit]=useState(false);
  const[viewer,setViewer]=useState(null);
  const[showGalleryMgr,setShowGalleryMgr]=useState(false);
  const[showPickNote,setShowPickNote]=useState(false);
  const[showDestMgr,setShowDestMgr]=useState(false);

  const allTags=useMemo(()=>{const s=new Set(customTags);travelData.forEach(d=>d.tags.forEach(t=>s.add(t)));return[...s].sort()},[travelData,customTags]);
  const storageBytes=useMemo(()=>{try{let t=0;for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&k.startsWith("family"))t+=localStorage.getItem(k).length*2}return t}catch{return 0}},[travelData,heroData,customTags]);

  const filteredMapIds=useMemo(()=>{if(!selectedYear)return null;const ids=new Set(travelData.filter(d=>d.year===selectedYear).map(d=>d.id));return ids.size>0?ids:null},[travelData,selectedYear]);

  // 监听 localStorage 写满事件，弹出警告
  useEffect(()=>{
    const handler=()=>setToastMsg("⚠️ 存储空间已满！请导出备份后清理旧照片或数据，否则新增内容无法保存");
    window.addEventListener("storageQuotaExceeded",handler);
    return ()=>window.removeEventListener("storageQuotaExceeded",handler);
  },[]);

  // Handlers
  const handleYearClick=y=>setSelectedYear(p=>p===y?null:y);
  const handleTripClick=d=>{setActiveId(d.id);setSelectedYear(d.year);setDetailDest(d)};
  const handleMarkerClick=id=>{setActiveId(id);setTimeout(()=>{document.querySelector(".dest-card.active")?.scrollIntoView({behavior:"smooth",block:"center"})},100)};
  const handleMarkerDetail=id=>{const d=travelData.find(x=>x.id===id);if(d){setActiveId(id);setDetailDest(d);setSelectedYear(d.year)}};
  const handleSelectCard=id=>setActiveId(id);
  const handleDetail=dest=>setDetailDest(dest);
  // 为地图弹窗中的纯HTML链接提供全局回调
  useEffect(()=>{window.__openTravelDetail=handleMarkerDetail;return()=>{delete window.__openTravelDetail}},[travelData]);
  const handleAdd=()=>{setEditingDest(null);setShowAddEdit(true)};
  const handleEdit=dest=>{setDetailDest(null);setEditingDest(dest);setShowAddEdit(true)};
  const handleDelete=id=>{setTravelData(p=>p.filter(d=>d.id!==id));if(activeId===id)setActiveId(null);setDetailDest(null);setToastMsg("已删除")};
  const handleSave=data=>{if(editingDest){setTravelData(p=>p.map(d=>d.id===data.id?data:d));setToastMsg("已更新 ✓")}else{setTravelData(p=>[data,...p]);setToastMsg("已添加 ✓")}setShowAddEdit(false);setEditingDest(null);if(data.id)setActiveId(data.id)};
  const handleNoteSave=updatedDest=>{setTravelData(p=>p.map(d=>d.id===updatedDest.id?updatedDest:d));setToastMsg("手记已保存 ✓")};
  const handleExport=()=>{const b=new Blob([JSON.stringify(travelData,null,2)],{type:"application/json"});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download=`family-travel-backup-${new Date().toISOString().slice(0,10)}.json`;a.click();URL.revokeObjectURL(u);setToastMsg("数据已导出 ✓")};
  const handleImport=data=>{if(window.confirm(`即将导入 ${data.length} 条记录，当前数据将被覆盖。确认？`)){setTravelData(data);setActiveId(null);setSelectedYear(null);setToastMsg(`成功导入 ${data.length} 条 ✓`)}};
  const handlePhotoClick=(imgs,idx)=>setViewer({images:imgs,startIndex:idx||0});
  const handleNoteDelete=destId=>{setTravelData(p=>p.map(d=>d.id===destId?{...d,note:""}:d));setToastMsg("手记已删除 ✓")};
  const handleDeletePhoto=(destId,imgIdx)=>{setTravelData(p=>p.map(d=>{if(d.id!==destId)return d;const all=[d.thumbnail,...(d.images||[])];all.splice(imgIdx,1);const newThumb=all[0]||"";const newImages=all.slice(1);return{...d,thumbnail:newThumb,images:newImages}}));setToastMsg("照片已删除 ✓")};
  const handleAddPhotos=(destId,urls)=>{setTravelData(p=>p.map(d=>{if(d.id!==destId)return d;const imgs=[...d.images||[],...urls];if(!d.thumbnail)return{...d,thumbnail:urls[0],images:imgs.slice(1)};return{...d,images:imgs}}));setToastMsg(`已添加 ${urls.length} 张照片 ✓`)};
  const handleSetThumbnail=(destId,url)=>{setTravelData(p=>p.map(d=>{if(d.id!==destId)return d;const all=[d.thumbnail,...(d.images||[])].filter(u=>u!==url);return{...d,thumbnail:url,images:all}}));setToastMsg("封面已更新 ✓")};
  const handlePickNoteDest=dest=>{setNoteDest(dest)};
  const handleAddCustomTag=t=>{if(!customTags.includes(t))setCustomTags(p=>[...p,t]);setToastMsg(`标签「${t}」已添加 ✓`)};
  const handleDeleteCustomTag=t=>{setCustomTags(p=>p.filter(x=>x!==t));setToastMsg(`标签「${t}」已删除 ✓`)};
  const handleSearchSelect=d=>{setActiveId(d.id);setDetailDest(d);setSelectedYear(d.year);setTimeout(()=>{document.getElementById("map-section")?.scrollIntoView({behavior:"smooth"})},200)};

  return(
    <div>
      <Navbar onAdd={handleAdd} data={travelData} onSearchSelect={handleSearchSelect}/>
      <Hero heroData={heroData} onEditHero={()=>setShowHeroEdit(true)}/>

      <div className="main-content">
        <Timeline data={travelData} selectedYear={selectedYear} onYearClick={handleYearClick} onTripClick={handleTripClick}/>
        <MapView data={travelData} activeId={activeId} filteredIds={filteredMapIds} onMarkerClick={handleMarkerClick} onMarkerDetail={handleMarkerDetail} onAdd={handleAdd} onManage={()=>setShowDestMgr(true)}/>
        <SidePanel data={travelData} activeId={activeId} onSelect={handleSelectCard} onDetail={handleDetail} onAdd={handleAdd} onExport={handleExport} customTags={customTags} onAddCustomTag={handleAddCustomTag} onDeleteCustomTag={handleDeleteCustomTag}/>
      </div>

      <SummaryBar data={travelData} onPhotoClick={handlePhotoClick} onNoteExpand={dest=>setNoteDest(dest)} onNoteEdit={handleEdit} onNoteDelete={handleNoteDelete} onManageGallery={()=>setShowGalleryMgr(true)} onAddNote={()=>setShowPickNote(true)}/>

      <Footer onExport={handleExport} onImport={handleImport} storageBytes={storageBytes} baidu={baidu} onToast={msg=>setToastMsg(msg)} syncNow={syncNow} onBaiduLogout={handleBaiduLogout}/>

      {showHeroEdit&&<HeroEditModal heroData={heroData} onSave={d=>{setHeroData(d);setShowHeroEdit(false);setToastMsg("标题已更新 ✓")}} onClose={()=>setShowHeroEdit(false)}/>}
      {detailDest&&<DetailModal dest={detailDest} onClose={()=>setDetailDest(null)} onEdit={handleEdit} onDelete={handleDelete}/>}
      {noteDest&&<NoteDetailModal dest={noteDest} onSave={handleNoteSave} onClose={()=>setNoteDest(null)}/>}
      {showAddEdit&&<AddEditModal dest={editingDest} onSave={handleSave} onClose={()=>{setShowAddEdit(false);setEditingDest(null)}} allTags={allTags}/>}
      {viewer&&<ImageViewer images={viewer.images} startIndex={viewer.startIndex} onClose={()=>setViewer(null)}/>}
      {showGalleryMgr&&<GalleryManager data={travelData} onDeletePhoto={handleDeletePhoto} onAddPhotos={handleAddPhotos} onSetThumbnail={handleSetThumbnail} onClose={()=>setShowGalleryMgr(false)}/>}
      {showPickNote&&<PickDestModal data={travelData} onPick={handlePickNoteDest} onClose={()=>setShowPickNote(false)}/>}
      {showDestMgr&&<DestinationManager data={travelData} onEdit={handleEdit} onDelete={handleDelete} onClose={()=>setShowDestMgr(false)}/>}
      {toastMsg&&<Toast message={toastMsg} onDone={()=>setToastMsg(null)}/>}
      <BackToTop/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
