<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>家庭旅游相册 — 我们的旅行足迹</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
  --cream: #FFF8F0; --cream-dark: #F5EDE0; --cream-darker: #EBE0D0;
  --gold: #D4A853; --gold-light: #E8CC7A; --gold-dark: #B8860B; --gold-pale: #F5E6C8;
  --amber: #C4953A; --text-primary: #2C2416; --text-secondary: #5C5242;
  --text-muted: #8A7E6E; --text-on-dark: #E8DCC8; --dark-bg: #1E1810; --dark-bg-alt: #282118;
  --white: #FFFFFF; --shadow-sm: 0 1px 3px rgba(44,36,22,0.06);
  --shadow-md: 0 4px 16px rgba(44,36,22,0.08); --shadow-lg: 0 12px 40px rgba(44,36,22,0.12);
  --shadow-xl: 0 24px 60px rgba(44,36,22,0.16);
  --radius-sm: 6px; --radius-md: 12px; --radius-lg: 20px; --radius-xl: 28px;
  --transition: 0.3s cubic-bezier(0.4,0,0.2,1);
  --font-serif: 'Noto Serif SC','Playfair Display',serif;
  --font-sans: 'Noto Sans SC',-apple-system,sans-serif;
  --max-width: 1440px; --navbar-height: 64px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;font-size:16px;-webkit-font-smoothing:antialiased}
body{font-family:var(--font-sans);background:var(--cream);color:var(--text-primary);line-height:1.7;overflow-x:hidden;min-height:100vh}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--cream-dark)}
::-webkit-scrollbar-thumb{background:var(--gold);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--gold-dark)}

/* ===== NAVBAR ===== */
.navbar{position:fixed;top:0;left:0;right:0;height:var(--navbar-height);background:rgba(255,248,240,0.78);backdrop-filter:blur(20px) saturate(1.4);-webkit-backdrop-filter:blur(20px) saturate(1.4);border-bottom:1px solid rgba(212,168,83,0.15);z-index:1000;display:flex;align-items:center;justify-content:center;transition:var(--transition)}
.navbar.scrolled{box-shadow:var(--shadow-md);background:rgba(255,248,240,0.92)}
.navbar-inner{width:100%;max-width:var(--max-width);padding:0 40px;display:flex;align-items:center;justify-content:space-between}
.nav-logo{font-family:var(--font-serif);font-size:1.35rem;font-weight:700;color:var(--gold-dark);letter-spacing:0.04em;display:flex;align-items:center;gap:10px;text-decoration:none;cursor:pointer}
.nav-logo .logo-icon{width:34px;height:34px;background:linear-gradient(135deg,var(--gold),var(--gold-dark));border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:0.9rem}
.nav-links{display:flex;gap:32px;list-style:none;align-items:center}
.nav-links a,.nav-links button{font-family:var(--font-sans);font-size:0.85rem;font-weight:400;color:var(--text-secondary);text-decoration:none;letter-spacing:0.02em;transition:var(--transition);position:relative;padding:4px 0;background:none;border:none;cursor:pointer}
.nav-links a::after,.nav-links button::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:1.5px;background:var(--gold);transform:scaleX(0);transition:transform 0.3s ease}
.nav-links a:hover,.nav-links button:hover{color:var(--gold-dark)}
.nav-links a:hover::after,.nav-links button:hover::after{transform:scaleX(1)}
.nav-btn{padding:8px 20px;background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#fff!important;border:none;border-radius:20px;font-family:var(--font-sans);font-size:0.8rem!important;cursor:pointer;transition:var(--transition);letter-spacing:0.03em}
.nav-btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(184,134,11,0.3)}
.nav-btn::after{display:none!important}

/* ===== HERO ===== */
.hero{margin-top:var(--navbar-height);padding:60px 40px 40px;text-align:center;max-width:var(--max-width);margin-left:auto;margin-right:auto;position:relative}
.hero-eyebrow{font-family:var(--font-sans);font-size:0.7rem;font-weight:400;letter-spacing:0.25em;text-transform:uppercase;color:var(--gold);margin-bottom:12px}
.hero h1{font-family:var(--font-serif);font-size:3rem;font-weight:700;color:var(--text-primary);letter-spacing:0.03em;margin-bottom:12px;line-height:1.25;display:inline-block;position:relative}
.hero-subtitle{font-family:var(--font-serif);font-size:1.1rem;font-style:italic;color:var(--text-muted);font-weight:400}
.hero-line{width:60px;height:2px;background:var(--gold);margin:20px auto 0;border-radius:1px}
.hero-edit-btn{position:absolute;right:40px;top:70px;width:36px;height:36px;border-radius:50%;border:1px solid rgba(212,168,83,0.2);background:var(--white);color:var(--text-muted);cursor:pointer;font-size:0.85rem;display:flex;align-items:center;justify-content:center;transition:var(--transition);opacity:0}
.hero:hover .hero-edit-btn{opacity:1}
.hero-edit-btn:hover{color:var(--gold-dark);border-color:var(--gold);box-shadow:var(--shadow-sm)}

/* ===== MAIN CONTENT ===== */
.main-content{max-width:var(--max-width);margin:0 auto;padding:0 40px 60px;display:flex;gap:0;position:relative;min-height:700px}

/* Timeline */
.timeline-col{width:90px;flex-shrink:0;position:relative;padding-top:20px}
.timeline-track{position:sticky;top:calc(var(--navbar-height) + 40px);display:flex;flex-direction:column;align-items:center;gap:6px}
.timeline-line{position:absolute;top:0;bottom:0;left:50%;width:1.5px;background:linear-gradient(to bottom,var(--gold),var(--gold-pale),var(--gold));transform:translateX(-50%);border-radius:1px}
.timeline-year{position:relative;z-index:2;font-family:var(--font-serif);font-size:0.85rem;font-weight:600;color:var(--gold-dark);cursor:pointer;padding:10px 8px;transition:var(--transition);text-align:center;width:100%;border-radius:var(--radius-sm);letter-spacing:0.03em;background:none;border:none}
.timeline-year:hover{color:var(--gold-dark);background:rgba(212,168,83,0.08)}
.timeline-year.active{color:#fff;background:var(--gold);border-radius:20px}
.timeline-dot{display:block;width:10px;height:10px;background:var(--gold);border-radius:50%;border:2px solid var(--cream);box-shadow:0 0 0 3px var(--gold-pale);margin:0 auto 4px;transition:var(--transition)}
.timeline-year.active .timeline-dot{background:var(--gold-dark);box-shadow:0 0 0 6px rgba(212,168,83,0.2)}
.timeline-trips{display:none;flex-direction:column;gap:2px;margin-top:4px}
.timeline-year.expanded .timeline-trips{display:flex}
.timeline-trip{font-family:var(--font-sans);font-size:0.68rem;color:var(--text-muted);cursor:pointer;padding:3px 8px;border-radius:10px;transition:var(--transition);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:80px;text-align:center;background:none;border:none}
.timeline-trip:hover{color:var(--gold-dark);background:rgba(212,168,83,0.06)}

/* Map */
.map-col{flex:1;min-width:0;padding:0 20px}
.map-wrapper{position:sticky;top:calc(var(--navbar-height) + 40px);height:580px;border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow-lg);border:2px solid rgba(212,168,83,0.12);background:var(--cream-dark);transition:var(--transition)}
.map-wrapper:hover{box-shadow:var(--shadow-xl);border-color:rgba(212,168,83,0.22)}
#map{width:100%;height:100%}
.leaflet-container{background:var(--cream-dark)!important;font-family:var(--font-sans)!important}
.leaflet-popup-content-wrapper{border-radius:var(--radius-md)!important;box-shadow:var(--shadow-lg)!important;border:1px solid rgba(212,168,83,0.15)!important;padding:0!important;overflow:hidden}
.leaflet-popup-content{margin:0!important;font-family:var(--font-sans)!important;min-width:200px}
.leaflet-popup-close-button{color:var(--text-secondary)!important;padding:8px!important;z-index:10}

.pulse-marker{width:18px;height:18px;background:var(--gold);border-radius:50%;border:3px solid #fff;box-shadow:0 2px 8px rgba(184,134,11,0.4);position:relative;transition:transform 0.2s ease}
.pulse-marker::before{content:'';position:absolute;top:-8px;left:-8px;width:28px;height:28px;border-radius:50%;border:2px solid rgba(212,168,83,0.5);animation:pulse-ring 2s ease-out infinite}
.pulse-marker.active{background:var(--gold-dark);transform:scale(1.3);border-color:#fff;box-shadow:0 4px 16px rgba(184,134,11,0.6)}
.pulse-marker.active::before{border-color:rgba(184,134,11,0.6);animation-duration:1.2s}
@keyframes pulse-ring{0%{transform:scale(0.8);opacity:1}100%{transform:scale(2.2);opacity:0}}

.map-popup-card img{width:100%;height:100px;object-fit:cover;display:block}
.map-popup-card .popup-body{padding:10px 12px}
.map-popup-card h4{font-family:var(--font-serif);font-size:0.9rem;color:var(--text-primary);margin-bottom:2px}
.map-popup-card .popup-loc{font-size:0.68rem;color:var(--gold-dark);font-weight:500;margin-bottom:2px}
.map-popup-card .popup-date{font-size:0.68rem;color:var(--text-muted)}
.popup-detail-link{display:inline-block;margin-top:6px;font-size:0.7rem;color:var(--gold-dark);cursor:pointer;text-decoration:none;font-weight:500;transition:var(--transition)}
.popup-detail-link:hover{color:var(--gold);text-decoration:underline}

/* ===== SIDE PANEL ===== */
.side-panel{width:380px;flex-shrink:0;display:flex;flex-direction:column;gap:14px}
.side-panel-header{position:sticky;top:calc(var(--navbar-height) + 40px);background:rgba(255,248,240,0.9);backdrop-filter:blur(12px);z-index:5;padding-bottom:4px}
.side-panel-title{font-family:var(--font-serif);font-size:1.1rem;font-weight:600;color:var(--text-primary);margin-bottom:10px;letter-spacing:0.02em}
.tag-filters{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:4px}
.tag-pill{padding:4px 14px;border-radius:14px;font-size:0.68rem;font-weight:400;border:1px solid rgba(212,168,83,0.25);background:transparent;color:var(--text-secondary);cursor:pointer;transition:var(--transition);letter-spacing:0.02em;white-space:nowrap;font-family:var(--font-sans)}
.tag-pill:hover{border-color:var(--gold);color:var(--gold-dark)}
.tag-pill.active{background:var(--gold);border-color:var(--gold);color:#fff}
.side-panel-actions{display:flex;gap:8px;margin-top:4px}
.btn-add{flex:1;padding:10px;border-radius:var(--radius-sm);border:1.5px dashed rgba(212,168,83,0.4);background:transparent;color:var(--gold-dark);font-family:var(--font-sans);font-size:0.78rem;cursor:pointer;transition:var(--transition);letter-spacing:0.03em;display:flex;align-items:center;justify-content:center;gap:6px}
.btn-add:hover{background:rgba(212,168,83,0.06);border-color:var(--gold)}
.btn-export{padding:10px 16px;border-radius:var(--radius-sm);border:1px solid rgba(212,168,83,0.2);background:transparent;color:var(--text-muted);font-family:var(--font-sans);font-size:0.73rem;cursor:pointer;transition:var(--transition);white-space:nowrap}
.btn-export:hover{color:var(--gold-dark);border-color:var(--gold)}
.cards-list{display:flex;flex-direction:column;gap:12px;max-height:calc(100vh - 300px);overflow-y:auto;padding-right:4px}

/* ===== DESTINATION CARD (Compact) ===== */
.dest-card{background:var(--white);border-radius:var(--radius-md);overflow:hidden;box-shadow:var(--shadow-sm);border:1px solid rgba(212,168,83,0.08);transition:var(--transition);cursor:pointer;position:relative}
.dest-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px);border-color:rgba(212,168,83,0.2)}
.dest-card.active{border-color:var(--gold);box-shadow:0 0 0 3px rgba(212,168,83,0.12),var(--shadow-md)}
.dest-card .card-thumb-area{position:relative;height:130px;overflow:hidden}
.dest-card .card-thumb-area img{width:100%;height:100%;object-fit:cover;transition:transform 0.6s ease}
.dest-card:hover .card-thumb-area img{transform:scale(1.05)}
.dest-card .card-body{padding:12px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.dest-card .card-info{flex:1;min-width:0}
.dest-card .card-title{font-family:var(--font-serif);font-size:0.9rem;font-weight:600;color:var(--text-primary);letter-spacing:0.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dest-card .card-sub{font-size:0.68rem;color:var(--text-muted);margin-top:2px}
.dest-card .card-sub span{margin-right:10px}
.dest-card .card-more{flex-shrink:0;font-size:0.72rem;color:var(--gold-dark);font-weight:500;cursor:pointer;padding:6px 14px;border-radius:16px;border:1px solid rgba(212,168,83,0.25);background:transparent;transition:var(--transition);font-family:var(--font-sans);letter-spacing:0.03em;white-space:nowrap}
.dest-card .card-more:hover{background:var(--gold);border-color:var(--gold);color:#fff}

/* ===== SECTION EDIT BUTTON (subtle) ===== */
.section-edit{display:inline-flex;align-items:center;gap:4px;font-size:0.7rem;color:var(--text-muted);cursor:pointer;border:none;background:none;font-family:var(--font-sans);padding:4px 8px;border-radius:12px;transition:var(--transition);letter-spacing:0.03em;margin-left:8px;vertical-align:middle}
.section-edit:hover{color:var(--gold-dark);background:rgba(212,168,83,0.08)}
.section-edit::before{content:'✎';font-size:0.65rem}

/* ===== MORE LINK ===== */
.more-link{display:inline-flex;align-items:center;gap:4px;color:var(--gold-dark);font-size:0.75rem;cursor:pointer;border:none;background:none;font-family:var(--font-sans);transition:var(--transition);padding:6px 0;letter-spacing:0.02em}
.more-link::after{content:'→';transition:transform 0.3s ease,opacity 0.3s ease}
.more-link:hover{gap:8px;color:var(--amber)}
.more-link:hover::after{transform:translateX(3px)}

/* ===== DETAIL MODAL ===== */
.modal-overlay{position:fixed;inset:0;background:rgba(20,16,10,0.5);z-index:5000;display:flex;align-items:center;justify-content:center;animation:fadeIn 0.25s ease;padding:20px}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.detail-modal{background:var(--white);border-radius:var(--radius-lg);width:100%;max-width:640px;max-height:85vh;overflow-y:auto;box-shadow:var(--shadow-xl);animation:slideUp 0.3s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.detail-modal .detail-carousel{position:relative;height:340px;overflow:hidden;background:var(--cream-dark)}
.detail-modal .detail-carousel img{width:100%;height:100%;object-fit:cover}
.detail-modal .carousel-arrow{position:absolute;top:50%;transform:translateY(-50%);width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.85);border:none;cursor:pointer;font-size:1rem;color:var(--text-secondary);display:flex;align-items:center;justify-content:center;transition:var(--transition);z-index:2}
.detail-modal .carousel-arrow:hover{background:#fff;color:var(--gold-dark)}
.detail-modal .carousel-arrow.left{left:10px}
.detail-modal .carousel-arrow.right{right:10px}
.detail-modal .carousel-dots{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);display:flex;gap:5px}
.detail-modal .carousel-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.5);transition:var(--transition)}
.detail-modal .carousel-dot.active{background:#fff;width:18px;border-radius:3px}
.detail-modal .detail-close{position:absolute;top:12px;right:16px;width:34px;height:34px;border-radius:50%;background:rgba(0,0,0,0.3);border:none;color:#fff;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--transition);z-index:10}
.detail-modal .detail-close:hover{background:rgba(0,0,0,0.5)}
.detail-modal .detail-body{padding:24px 28px 20px}
.detail-modal .detail-title{font-family:var(--font-serif);font-size:1.5rem;font-weight:700;color:var(--text-primary);margin-bottom:2px;letter-spacing:0.02em}
.detail-modal .detail-location{font-size:0.85rem;color:var(--gold-dark);font-weight:500;margin-bottom:16px}
.detail-modal .detail-meta{display:grid;grid-template-columns:1fr 1fr;gap:8px 24px;margin-bottom:14px}
.detail-modal .detail-meta-item{font-size:0.78rem;color:var(--text-secondary)}
.detail-modal .detail-meta-item strong{font-weight:500;color:var(--text-primary);margin-right:4px}
.detail-modal .detail-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.detail-modal .detail-tags span{padding:3px 12px;border-radius:12px;background:var(--gold-pale);color:var(--gold-dark);font-size:0.7rem}
.detail-modal .detail-note-title{font-family:var(--font-serif);font-size:0.9rem;font-weight:600;color:var(--text-primary);margin-bottom:6px;letter-spacing:0.02em}
.detail-modal .detail-note{font-size:0.82rem;color:var(--text-secondary);line-height:1.8;margin-bottom:18px}
.detail-modal .detail-actions{display:flex;gap:10px;padding-top:16px;border-top:1px solid var(--cream-darker)}
.detail-btn{padding:10px 22px;border-radius:20px;font-family:var(--font-sans);font-size:0.78rem;cursor:pointer;transition:var(--transition);letter-spacing:0.03em;border:none}
.detail-btn.primary{background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#fff}
.detail-btn.primary:hover{box-shadow:0 4px 16px rgba(184,134,11,0.3);transform:translateY(-1px)}
.detail-btn.ghost{border:1.5px solid var(--cream-darker);background:transparent;color:var(--text-secondary)}
.detail-btn.ghost:hover{border-color:var(--text-muted)}
.detail-btn.danger{border:1.5px solid rgba(212,117,107,0.2);background:transparent;color:#d4756b}
.detail-btn.danger:hover{border-color:#d4756b;background:rgba(212,117,107,0.04)}

/* ===== NOTE MODAL ===== */
.note-modal{background:var(--white);border-radius:var(--radius-lg);width:100%;max-width:540px;max-height:85vh;overflow-y:auto;box-shadow:var(--shadow-xl);animation:slideUp 0.3s ease;padding:28px}
.note-modal h3{font-family:var(--font-serif);font-size:1.15rem;margin-bottom:4px;color:var(--text-primary);letter-spacing:0.02em}
.note-modal .note-meta-text{font-size:0.73rem;color:var(--text-muted);margin-bottom:16px}
.note-modal textarea{width:100%;min-height:160px;padding:14px;border:1.5px solid var(--cream-darker);border-radius:var(--radius-sm);font-family:var(--font-sans);font-size:0.84rem;color:var(--text-primary);line-height:1.8;background:var(--cream);resize:vertical;transition:var(--transition)}
.note-modal textarea:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(212,168,83,0.08)}
.note-modal .note-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:16px}

/* ===== SIMPLE EDIT MODAL (Hero) ===== */
.simple-modal{background:var(--white);border-radius:var(--radius-lg);width:100%;max-width:460px;box-shadow:var(--shadow-xl);animation:slideUp 0.3s ease;padding:28px}
.simple-modal h3{font-family:var(--font-serif);font-size:1.1rem;margin-bottom:16px;color:var(--text-primary);letter-spacing:0.02em}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:0.72rem;color:var(--text-secondary);margin-bottom:4px;font-weight:500;letter-spacing:0.03em}
.form-group input,.form-group textarea,.form-group select{width:100%;padding:10px 14px;border:1.5px solid var(--cream-darker);border-radius:var(--radius-sm);font-family:var(--font-sans);font-size:0.82rem;color:var(--text-primary);background:var(--cream);transition:var(--transition);resize:vertical}
.form-group input:focus,.form-group textarea:focus,.form-group select:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(212,168,83,0.08)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}

/* ===== SUMMARY BAR ===== */
.summary-bar{background:var(--dark-bg);color:var(--text-on-dark);padding:70px 40px 60px}
.summary-bar-inner{max-width:var(--max-width);margin:0 auto}

.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:40px;margin-bottom:60px;text-align:center}
.stat-item{padding:30px 20px}
.stat-number{font-family:var(--font-serif);font-size:3rem;font-weight:700;color:var(--gold-light);line-height:1.1;margin-bottom:4px}
.stat-number .unit{font-size:1.2rem;font-weight:400;color:var(--gold)}
.stat-label{font-size:0.82rem;color:var(--text-muted);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:10px}
.stat-detail{font-size:0.72rem;color:rgba(232,220,200,0.5);line-height:1.6}

.section-header{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:8px;flex-wrap:wrap}
.section-title{font-family:var(--font-serif);font-size:1.5rem;color:var(--gold-light);letter-spacing:0.03em}
.section-sub{text-align:center;font-size:0.78rem;color:var(--text-muted);margin-bottom:36px}

/* Waterfall */
.waterfall-gallery{columns:4;column-gap:16px;margin-bottom:24px}
.waterfall-item{break-inside:avoid;margin-bottom:16px;border-radius:var(--radius-sm);overflow:hidden;position:relative;cursor:pointer;transition:var(--transition)}
.waterfall-item img{width:100%;display:block;transition:transform 0.6s ease}
.waterfall-item:hover img{transform:scale(1.06)}
.waterfall-item .waterfall-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(30,24,16,0.85) 0%,transparent 60%);opacity:0;transition:var(--transition);display:flex;flex-direction:column;justify-content:flex-end;padding:14px}
.waterfall-item:hover .waterfall-overlay{opacity:1}
.waterfall-overlay .wf-location{font-family:var(--font-serif);font-size:0.85rem;font-weight:600;color:#fff}
.waterfall-overlay .wf-date{font-size:0.68rem;color:var(--gold-light)}
.gallery-more-wrap{text-align:center;margin-bottom:60px}
.gallery-more-btn{display:inline-flex;align-items:center;gap:6px;padding:12px 30px;border-radius:24px;border:1.5px solid rgba(212,168,83,0.3);background:transparent;color:var(--gold-light);font-family:var(--font-sans);font-size:0.8rem;cursor:pointer;transition:var(--transition);letter-spacing:0.04em}
.gallery-more-btn:hover{background:rgba(212,168,83,0.08);border-color:var(--gold);gap:12px}
.gallery-more-btn::after{content:'→';transition:transform 0.3s ease}
.gallery-more-btn:hover::after{transform:translateX(4px)}

/* Notes Grid */
.notes-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
.note-card{background:var(--dark-bg-alt);border-radius:var(--radius-md);padding:24px;border:1px solid rgba(212,168,83,0.08);transition:var(--transition)}
.note-card:hover{border-color:rgba(212,168,83,0.2);transform:translateY(-2px)}
.note-card .note-date{font-size:0.7rem;color:var(--gold);letter-spacing:0.05em;margin-bottom:6px}
.note-card .note-title{font-family:var(--font-serif);font-size:1rem;color:var(--text-on-dark);margin-bottom:8px}
.note-card .note-excerpt{font-size:0.75rem;color:var(--text-muted);line-height:1.7}
.note-card .note-actions-row{display:flex;gap:8px;margin-top:10px;justify-content:flex-end}

/* ===== FOOTER ===== */
.footer{background:var(--dark-bg);border-top:1px solid rgba(212,168,83,0.1);padding:30px 40px;text-align:center}
.footer-inner{max-width:var(--max-width);margin:0 auto;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px}
.footer-text{font-size:0.73rem;color:var(--text-muted);letter-spacing:0.03em}
.footer-links{display:flex;gap:24px}
.footer-links a,.footer-links button,.footer-links label{font-size:0.73rem;color:var(--text-muted);text-decoration:none;background:none;border:none;cursor:pointer;font-family:var(--font-sans);letter-spacing:0.03em;transition:var(--transition);padding:0}
.footer-links a:hover,.footer-links button:hover,.footer-links label:hover{color:var(--gold-light)}

/* Storage indicator — 底部存储用量指示条 */
.storage-indicator{display:inline-flex;align-items:center;gap:8px;font-size:0.68rem;color:var(--text-muted);letter-spacing:0.03em;white-space:nowrap;background:rgba(255,255,255,0.03);padding:4px 12px;border-radius:16px;border:1px solid rgba(255,255,255,0.06)}
.storage-bar-track{width:80px;height:6px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden;flex-shrink:0;box-shadow:inset 0 1px 2px rgba(0,0,0,0.2)}
.storage-bar-fill{height:100%;border-radius:3px;transition:width 0.6s ease,background 0.6s ease,box-shadow 0.6s ease;background:linear-gradient(90deg,#4caf50,#8bc34a)}
.storage-bar-fill.warning{background:linear-gradient(90deg,#ff9800,#ffc107);box-shadow:0 0 6px rgba(255,152,0,0.4)}
.storage-bar-fill.danger{background:linear-gradient(90deg,#f44336,#ff5722);box-shadow:0 0 8px rgba(244,67,54,0.5);animation:storage-pulse 1.5s ease-in-out infinite}
@keyframes storage-pulse{0%,100%{opacity:0.85}50%{opacity:1}}
.storage-indicator .storage-pct{font-variant-numeric:tabular-nums;min-width:30px;text-align:right;font-weight:600;font-size:0.7rem}
@media(max-width:640px){.storage-indicator{font-size:0.6rem;padding:3px 8px}.storage-bar-track{width:50px;height:5px}}

/* Baidu Cloud panel */
.baidu-panel{display:inline-flex;align-items:center;gap:8px}
.baidu-btn{display:inline-flex;align-items:center;gap:5px;padding:5px 14px;border-radius:14px;font-size:0.68rem;font-family:var(--font-sans);cursor:pointer;transition:var(--transition);letter-spacing:0.02em;border:1px solid rgba(212,168,83,0.2);background:transparent;color:var(--text-muted)}
.baidu-btn:hover{border-color:var(--gold);color:var(--gold-dark)}
.baidu-btn.connected{background:rgba(76,175,80,0.08);border-color:rgba(76,175,80,0.3);color:#4caf50}
.baidu-btn.connected:hover{background:rgba(76,175,80,0.14)}
.baidu-status{width:7px;height:7px;border-radius:50%;background:var(--text-muted);flex-shrink:0}
.baidu-status.on{background:#4caf50;box-shadow:0 0 6px rgba(76,175,80,0.4)}
.cloud-actions{display:none;position:absolute;bottom:calc(100% + 8px);right:0;background:var(--white);border-radius:var(--radius-md);box-shadow:var(--shadow-lg);border:1px solid rgba(212,168,83,0.12);padding:8px;z-index:100;min-width:160px;animation:slideUp 0.2s ease}
.cloud-actions.show{display:block}
.cloud-actions button{display:block;width:100%;padding:8px 14px;border:none;background:none;font-family:var(--font-sans);font-size:0.72rem;color:var(--text-secondary);cursor:pointer;text-align:left;border-radius:var(--radius-sm);transition:var(--transition)}
.cloud-actions button:hover{background:rgba(212,168,83,0.08);color:var(--gold-dark)}

/* ===== IMAGE VIEWER ===== */
.image-viewer-overlay{position:fixed;inset:0;background:rgba(20,16,10,0.96);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;animation:fadeIn 0.3s ease}
.viewer-close{position:absolute;top:20px;right:24px;width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:#fff;font-size:1.4rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--transition);z-index:10}
.viewer-close:hover{background:rgba(255,255,255,0.15)}
.viewer-main{flex:1;display:flex;align-items:center;justify-content:center;padding:80px 60px 20px;position:relative;width:100%}
.viewer-main img{max-width:100%;max-height:75vh;object-fit:contain;border-radius:4px;box-shadow:0 20px 60px rgba(0,0,0,0.5);animation:zoomIn 0.35s ease}
@keyframes zoomIn{from{opacity:0;transform:scale(0.92)}to{opacity:1;transform:scale(1)}}
.viewer-nav{position:absolute;top:50%;transform:translateY(-50%);width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);color:#fff;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--transition);z-index:10}
.viewer-nav:hover{background:rgba(255,255,255,0.14)}
.viewer-nav.prev{left:24px}
.viewer-nav.next{right:24px}
.viewer-thumbnails{display:flex;gap:8px;padding:16px 40px 24px;overflow-x:auto;max-width:100%;justify-content:center}
.viewer-thumb{width:56px;height:40px;border-radius:4px;overflow:hidden;cursor:pointer;opacity:0.4;transition:var(--transition);flex-shrink:0;border:2px solid transparent}
.viewer-thumb:hover{opacity:0.7}
.viewer-thumb.active{opacity:1;border-color:var(--gold)}
.viewer-thumb img{width:100%;height:100%;object-fit:cover}
.viewer-info{position:absolute;bottom:100px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.6);font-size:0.75rem;letter-spacing:0.04em}

/* ===== TOAST ===== */
.toast{position:fixed;bottom:36px;left:50%;transform:translateX(-50%);background:var(--dark-bg);color:var(--text-on-dark);padding:12px 28px;border-radius:24px;font-size:0.78rem;z-index:8000;box-shadow:var(--shadow-lg);animation:toastIn 0.3s ease,toastOut 0.3s ease 2.5s forwards;letter-spacing:0.03em}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes toastOut{from{opacity:1}to{opacity:0}}

/* ===== SEARCH BAR ===== */
.nav-search-wrap{position:relative;margin-right:4px}
.nav-search-input{width:180px;padding:7px 14px 7px 32px;border:1px solid rgba(212,168,83,0.2);border-radius:18px;background:rgba(255,248,240,0.6);font-family:var(--font-sans);font-size:0.75rem;color:var(--text-primary);transition:var(--transition);outline:none;letter-spacing:0.02em}
.nav-search-input:focus{width:220px;border-color:var(--gold);background:var(--white);box-shadow:0 2px 12px rgba(212,168,83,0.1)}
.nav-search-input::placeholder{color:var(--text-muted);font-size:0.7rem}
.nav-search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:0.7rem;color:var(--text-muted);pointer-events:none;transition:var(--transition)}
.nav-search-wrap:focus-within .nav-search-icon{color:var(--gold)}
.search-results{position:absolute;top:calc(100% + 6px);right:0;width:300px;background:var(--white);border-radius:var(--radius-md);box-shadow:var(--shadow-xl);border:1px solid rgba(212,168,83,0.12);overflow:hidden;z-index:1100;animation:slideUp 0.2s ease}
.search-result-item{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;transition:var(--transition);border-bottom:1px solid var(--cream-darker)}
.search-result-item:last-child{border-bottom:none}
.search-result-item:hover{background:rgba(212,168,83,0.05)}
.search-result-item .sr-thumb{width:36px;height:28px;border-radius:4px;object-fit:cover;flex-shrink:0;background:var(--cream-dark)}
.search-result-item .sr-info{flex:1;min-width:0}
.search-result-item .sr-name{font-family:var(--font-serif);font-size:0.78rem;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.search-result-item .sr-meta{font-size:0.63rem;color:var(--text-muted);margin-top:1px}
.search-result-item .sr-arrow{color:var(--gold);font-size:0.8rem;flex-shrink:0}
.search-no-results{padding:20px;text-align:center;font-size:0.73rem;color:var(--text-muted)}

/* ===== BACK TO TOP ===== */
.back-to-top{position:fixed;right:24px;bottom:40px;width:38px;height:38px;border-radius:50%;background:rgba(212,168,83,0.15);border:1px solid rgba(212,168,83,0.2);color:var(--gold-dark);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--transition);z-index:900;opacity:0;transform:translateY(10px);pointer-events:none;backdrop-filter:blur(4px)}
.back-to-top.visible{opacity:1;transform:translateY(0);pointer-events:auto}
.back-to-top:hover{background:rgba(212,168,83,0.3);border-color:var(--gold);transform:translateY(-2px);box-shadow:0 4px 16px rgba(184,134,11,0.15)}
@media(max-width:640px){.back-to-top{right:12px;bottom:20px;width:34px;height:34px}.nav-search-input{width:130px}.nav-search-input:focus{width:160px}.search-results{width:260px;right:-20px}}

/* ===== RESPONSIVE ===== */
@media(max-width:1280px){.side-panel{width:320px}.waterfall-gallery{columns:3}.notes-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:1024px){.main-content{flex-direction:column}.timeline-col{width:100%;padding-top:0}.timeline-track{position:static;flex-direction:row;flex-wrap:wrap;justify-content:center;gap:4px;padding-bottom:16px}.timeline-line{display:none}.timeline-year{width:auto;padding:6px 14px;font-size:0.75rem}.timeline-trip{max-width:none}.map-col{padding:0}.map-wrapper{position:static;height:400px;margin-bottom:20px}.side-panel{width:100%}.side-panel-header{position:static}.cards-list{max-height:none;flex-direction:row;flex-wrap:wrap}.dest-card{width:calc(50% - 6px)}.waterfall-gallery{columns:2}.notes-grid{grid-template-columns:1fr 1fr}.stats-row{gap:20px}.stat-number{font-size:2.2rem}}
@media(max-width:640px){.hero h1{font-size:1.8rem}.hero{padding:40px 16px 30px}.main-content{padding:0 16px 40px}.navbar-inner{padding:0 16px}.nav-links{gap:14px}.nav-links a,.nav-links button{font-size:0.7rem}.map-wrapper{height:320px;border-radius:var(--radius-md)}.dest-card{width:100%}.stats-row{grid-template-columns:1fr;gap:8px}.waterfall-gallery{columns:2;column-gap:8px}.waterfall-item{margin-bottom:8px}.notes-grid{grid-template-columns:1fr}.footer-inner{flex-direction:column;text-align:center}.summary-bar{padding:40px 16px}.detail-modal{max-width:95vw}.detail-modal .detail-carousel{height:220px}.detail-modal .detail-body{padding:16px}.detail-modal .detail-title{font-size:1.2rem}}

/* ===== SECTION TOOLBAR ===== */
.section-toolbar{display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap}
.section-edit-btn{display:inline-flex;align-items:center;gap:4px;padding:6px 14px;border-radius:16px;border:1px solid rgba(212,168,83,0.25);background:transparent;color:var(--text-secondary);font-family:var(--font-sans);font-size:0.68rem;cursor:pointer;transition:var(--transition);letter-spacing:0.03em;white-space:nowrap}
.section-edit-btn:hover{border-color:var(--gold);color:var(--gold-dark);background:rgba(212,168,83,0.05)}
.section-edit-btn.add-btn{border-style:dashed;color:var(--gold-dark)}
.section-edit-btn.add-btn:hover{background:rgba(212,168,83,0.08)}

/* Map toolbar */
.map-toolbar{position:absolute;top:12px;right:12px;z-index:500;display:flex;gap:6px}
.map-toolbar-btn{display:inline-flex;align-items:center;gap:4px;padding:6px 12px;border-radius:14px;background:rgba(255,255,255,0.9);border:1px solid rgba(212,168,83,0.2);color:var(--text-secondary);font-family:var(--font-sans);font-size:0.68rem;cursor:pointer;transition:var(--transition);box-shadow:var(--shadow-sm);letter-spacing:0.02em;backdrop-filter:blur(4px)}
.map-toolbar-btn:hover{color:var(--gold-dark);border-color:var(--gold);box-shadow:var(--shadow-md)}

/* Gallery & Note Manager Modals */
.gm-modal{background:var(--white);border-radius:var(--radius-lg);width:100%;max-width:680px;max-height:85vh;overflow-y:auto;box-shadow:var(--shadow-xl);animation:slideUp 0.3s ease;padding:24px 28px}
.gm-modal h3{font-family:var(--font-serif);font-size:1.1rem;margin-bottom:20px;color:var(--text-primary);letter-spacing:0.02em}
.gm-dest-group{margin-bottom:18px;border:1px solid var(--cream-darker);border-radius:var(--radius-md);overflow:hidden}
.gm-dest-header{padding:10px 14px;background:var(--cream);display:flex;justify-content:space-between;align-items:center;gap:8px}
.gm-dest-name{font-family:var(--font-serif);font-size:0.82rem;font-weight:600;color:var(--text-primary);letter-spacing:0.02em}
.gm-dest-meta{font-size:0.65rem;color:var(--text-muted)}
.gm-photos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px;padding:10px 12px}
.gm-photo-item{position:relative;border-radius:var(--radius-sm);overflow:hidden;aspect-ratio:4/3;background:var(--cream-dark);cursor:pointer;transition:var(--transition)}
.gm-photo-item img{width:100%;height:100%;object-fit:cover}
.gm-photo-item.is-thumb{box-shadow:0 0 0 2px var(--gold),0 0 0 4px rgba(212,168,83,0.2)}
.gm-photo-item .gm-photo-del{position:absolute;top:4px;right:4px;width:22px;height:22px;border-radius:50%;background:rgba(0,0,0,0.45);color:#fff;border:none;cursor:pointer;font-size:0.6rem;display:flex;align-items:center;justify-content:center;transition:var(--transition);opacity:0;line-height:1}
.gm-photo-item:hover .gm-photo-del{opacity:1}
.gm-photo-item .gm-photo-del:hover{background:rgba(212,90,80,0.9)}
.gm-add-row{display:flex;gap:8px;padding:6px 12px 12px}
.gm-add-row input{flex:1;padding:7px 10px;border:1.5px solid var(--cream-darker);border-radius:var(--radius-sm);font-size:0.72rem;font-family:var(--font-sans);background:var(--cream);transition:var(--transition)}
.gm-add-row input:focus{outline:none;border-color:var(--gold)}
.gm-add-row button,.gm-set-thumb-btn{padding:6px 12px;border-radius:14px;border:none;background:var(--gold);color:#fff;font-size:0.7rem;cursor:pointer;font-family:var(--font-sans);transition:var(--transition);white-space:nowrap;letter-spacing:0.02em}
.gm-add-row button:hover,.gm-set-thumb-btn:hover{background:var(--gold-dark)}
.gm-set-thumb-btn{background:transparent;border:1px solid rgba(212,168,83,0.3);color:var(--text-secondary);padding:4px 10px;font-size:0.65rem}
.gm-set-thumb-btn:hover{background:rgba(212,168,83,0.08);color:var(--gold-dark)}
.gm-empty{text-align:center;padding:30px;color:var(--text-muted);font-size:0.78rem}

/* Note card delete */
.note-card .note-delete-btn{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:0.68rem;padding:2px 6px;border-radius:10px;transition:var(--transition);font-family:var(--font-sans)}
.note-card .note-delete-btn:hover{color:#d4756b;background:rgba(212,117,107,0.06)}

/* Pick destination dropdown */
.pick-dest-modal{background:var(--white);border-radius:var(--radius-lg);width:100%;max-width:420px;max-height:70vh;overflow-y:auto;box-shadow:var(--shadow-xl);animation:slideUp 0.3s ease;padding:24px}
.pick-dest-modal h3{font-family:var(--font-serif);font-size:1.05rem;margin-bottom:16px;color:var(--text-primary)}
.pick-dest-item{padding:10px 14px;border-radius:var(--radius-sm);cursor:pointer;transition:var(--transition);border:1px solid transparent;margin-bottom:4px;display:flex;justify-content:space-between;align-items:center}
.pick-dest-item:hover{background:rgba(212,168,83,0.05);border-color:rgba(212,168,83,0.15)}
.pick-dest-item .pick-name{font-family:var(--font-serif);font-size:0.82rem;color:var(--text-primary)}
.pick-dest-item .pick-meta{font-size:0.65rem;color:var(--text-muted)}

/* ===== TAG INPUT ===== */
.tag-input-wrap{display:flex;flex-wrap:wrap;gap:6px;padding:8px 12px;border:1.5px solid var(--cream-darker);border-radius:var(--radius-sm);background:var(--cream);min-height:42px;align-items:center;transition:var(--transition);cursor:text}
.tag-input-wrap:focus-within{border-color:var(--gold);box-shadow:0 0 0 3px rgba(212,168,83,0.08)}
.tag-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:12px;background:var(--gold-pale);color:var(--gold-dark);font-size:0.7rem;font-weight:500;letter-spacing:0.02em;white-space:nowrap}
.tag-chip .tag-chip-x{cursor:pointer;font-size:0.65rem;opacity:0.6;transition:var(--transition);line-height:1;padding:0 2px}
.tag-chip .tag-chip-x:hover{opacity:1;color:#d4756b}
.tag-input-field{border:none;outline:none;background:transparent;font-family:var(--font-sans);font-size:0.76rem;color:var(--text-primary);flex:1;min-width:80px;padding:2px 4px}
.tag-input-field::placeholder{color:var(--text-muted)}
.tag-suggest-dropdown{position:absolute;top:100%;left:0;right:0;background:var(--white);border:1px solid var(--cream-darker);border-radius:var(--radius-sm);box-shadow:var(--shadow-lg);z-index:100;max-height:140px;overflow-y:auto}
.tag-suggest-item{padding:8px 14px;font-size:0.73rem;cursor:pointer;transition:var(--transition);color:var(--text-secondary)}
.tag-suggest-item:hover{background:rgba(212,168,83,0.08);color:var(--gold-dark)}
.tag-suggest-item.active{background:rgba(212,168,83,0.12);color:var(--gold-dark)}
.tag-manage-row{display:flex;gap:6px;align-items:center;margin-top:4px}
.tag-manage-row input{padding:4px 10px;border:1px solid var(--cream-darker);border-radius:12px;font-size:0.68rem;font-family:var(--font-sans);flex:1;background:var(--cream);transition:var(--transition)}
.tag-manage-row input:focus{outline:none;border-color:var(--gold)}
.tag-manage-row button{padding:3px 12px;border-radius:12px;border:1px solid var(--gold);background:transparent;color:var(--gold-dark);font-size:0.65rem;cursor:pointer;font-family:var(--font-sans);transition:var(--transition);white-space:nowrap}
.tag-manage-row button:hover{background:var(--gold);color:#fff}

/* ===== PHOTO UPLOAD ===== */
.upload-btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:16px;border:1.5px dashed rgba(212,168,83,0.4);background:transparent;color:var(--gold-dark);font-family:var(--font-sans);font-size:0.7rem;cursor:pointer;transition:var(--transition);letter-spacing:0.02em}
.upload-btn:hover{border-color:var(--gold);background:rgba(212,168,83,0.05)}
.upload-btn input[type=file]{display:none}
.photo-previews{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:8px;margin-top:8px}
.photo-preview-item{position:relative;border-radius:var(--radius-sm);overflow:hidden;aspect-ratio:4/3;background:var(--cream-dark);border:1px solid var(--cream-darker)}
.photo-preview-item img{width:100%;height:100%;object-fit:cover}
.photo-preview-item .preview-del{position:absolute;top:3px;right:3px;width:20px;height:20px;border-radius:50%;background:rgba(0,0,0,0.5);color:#fff;border:none;cursor:pointer;font-size:0.55rem;display:flex;align-items:center;justify-content:center;transition:var(--transition);opacity:0}
.photo-preview-item:hover .preview-del{opacity:1}
.photo-preview-item .preview-del:hover{background:rgba(212,90,80,0.9)}
.photo-preview-item .preview-label{position:absolute;bottom:2px;left:2px;font-size:0.5rem;background:rgba(0,0,0,0.5);color:#fff;padding:1px 5px;border-radius:4px}
.photo-upload-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:6px}
</style>

<body>
<div id="root"></div>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script type="text/babel">
/* ============================================================
 * 📦 基础设置：React Hooks 解构、默认数据、工具函数
 * - useLocalStorage: 数据自动同步到浏览器 localStorage，刷新不丢失
 * - formatDate / formatCost: 日期和费用格式化
 * - Toast: 操作反馈消息（2.8秒自动消失）
 * - defaultTravelData: 初始旅行数据（空数组 = 纯白板启动）
 * ============================================================ */
const { useState, useEffect, useRef, useCallback, useMemo } = React;

const defaultTravelData = [];

// --- 工具函数 & 通用组件 ---
function useLocalStorage(key, initialValue) {
  const [value, setValue] = useState(() => {try{const s=localStorage.getItem(key);return s?JSON.parse(s):initialValue}catch{return initialValue}});
  useEffect(() => {
    try{localStorage.setItem(key,JSON.stringify(value))}
    catch(e){
      // localStorage 满或隐私模式阻止写入时，发出全局通知
      if(e.name==="QuotaExceededError"||e.code===22||e.name==="NS_ERROR_DOM_QUOTA_REACHED"){
        console.error("localStorage 写入失败：已达 5MB 上限",key);
        window.dispatchEvent(new CustomEvent("storageQuotaExceeded",{detail:{key}}));
      }
    }
  }, [key,value]);
  return [value, setValue];
}
function formatDate(d){if(!d)return"";const dt=new Date(d);return`${dt.getFullYear()}.${String(dt.getMonth()+1).padStart(2,"0")}.${String(dt.getDate()).padStart(2,"0")}`}
function formatCost(n){if(n>=10000)return(n/10000).toFixed(1)+"万";if(n>=1000)return(n/1000).toFixed(1)+"k";return String(n)}

function Toast({message,onDone}){
  useEffect(()=>{const t=setTimeout(onDone,2800);return()=>clearTimeout(t)},[onDone]);
  return <div className="toast">{message}</div>;
}

/* ============================================================
 * 🧭 NAVBAR 顶部导航栏
 * 固定顶部，毛玻璃效果。包含：Logo、地图/影像集/手记三个锚点导航、
 * 搜索框（按名称/城市搜索目的地）、数据导出/导入按钮
 * ============================================================ */
function Navbar({onAdd,data,onSearchSelect}){
  const[scrolled,setScrolled]=useState(false);
  const[query,setQuery]=useState("");
  const[results,setResults]=useState([]);
  const[showResults,setShowResults]=useState(false);
  const searchRef=useRef(null);

  useEffect(()=>{const h=()=>setScrolled(window.scrollY>20);window.addEventListener("scroll",h,{passive:true});return()=>window.removeEventListener("scroll",h)},[]);
  useEffect(()=>{const h=e=>{if(searchRef.current&&!searchRef.current.contains(e.target))setShowResults(false)};document.addEventListener("mousedown",h);return()=>document.removeEventListener("mousedown",h)},[]);

  const doSearch=v=>{setQuery(v);if(!v.trim()){setResults([]);setShowResults(false);return};const q=v.trim().toLowerCase();const r=data.filter(d=>d.province.toLowerCase().includes(q)||d.city.toLowerCase().includes(q)||d.placeName.toLowerCase().includes(q)).slice(0,6);setResults(r);setShowResults(r.length>0)};
  const handleSelect=d=>{setShowResults(false);setQuery("");setResults([]);onSearchSelect(d)};

  const scrollTo=id=>{document.getElementById(id)?.scrollIntoView({behavior:"smooth"})};
  return(
    <nav className={`navbar${scrolled?" scrolled":""}`}>
      <div className="navbar-inner">
        <a className="nav-logo" href="#" onClick={e=>{e.preventDefault();window.scrollTo({top:0,behavior:"smooth"})}}><span className="logo-icon">✦</span>家庭旅行相册</a>
        <div className="nav-links">
          <button onClick={()=>scrollTo("map-section")}>旅行地图</button>
          <button onClick={()=>scrollTo("gallery-section")}>影像集</button>
          <button onClick={()=>scrollTo("notes-section")}>游记</button>
          <div className="nav-search-wrap" ref={searchRef}>
            <span className="nav-search-icon">🔍</span>
            <input className="nav-search-input" value={query} onChange={e=>doSearch(e.target.value)} onFocus={()=>results.length>0&&setShowResults(true)} onKeyDown={e=>{if(e.key==="Escape"){setShowResults(false);setQuery("")}}} placeholder="搜索目的地…"/>
            {showResults&&(
              <div className="search-results">
                {results.map(d=>(
                  <div key={d.id} className="search-result-item" onClick={()=>handleSelect(d)}>
                    <img className="sr-thumb" src={d.thumbnail} alt="" onError={e=>{e.target.style.display="none"}}/>
                    <div className="sr-info">
                      <div className="sr-name">{d.placeName}</div>
                      <div className="sr-meta">{d.province} · {d.city} · {formatDate(d.startDate)}</div>
                    </div>
                    <span className="sr-arrow">→</span>
                  </div>
                ))}
              </div>
            )}
          </div>
          <button className="nav-btn" onClick={onAdd}>+ 记录旅程</button>
        </div>
      </div>
    </nav>
  );
}

// ============================================================
// 🏠 HERO 标题区 — 页面主/副标题展示，悬停出现编辑按钮
// ============================================================
function Hero({heroData,onEditHero}){
  return(
    <div className="hero">
      <p className="hero-eyebrow">Family Travel Memories</p>
      <h1>{heroData.title}</h1>
      <button className="hero-edit-btn" onClick={onEditHero} title="编辑标题">✎</button>
      <p className="hero-subtitle">{heroData.subtitle}</p>
      <div className="hero-line"></div>
    </div>
  );
}

// ============================================================
// ✏️ HeroEditModal — 编辑页面标题/副标题的弹窗
// ============================================================
// ============================================================
function HeroEditModal({heroData,onSave,onClose}){
  const[title,setTitle]=useState(heroData.title);
  const[subtitle,setSubtitle]=useState(heroData.subtitle);
  return(
    <div className="modal-overlay" onClick={onClose}>
      <div className="simple-modal" onClick={e=>e.stopPropagation()}>
        <h3>编辑页面标题</h3>
        <div className="form-group"><label>主标题</label><input value={title} onChange={e=>setTitle(e.target.value)}/></div>
        <div className="form-group"><label>副标题</label><input value={subtitle} onChange={e=>setSubtitle(e.target.value)}/></div>
        <div className="form-actions">
          <button className="detail-btn ghost" onClick={onClose}>取消</button>
          <button className="detail-btn primary" onClick={()=>onSave({title,subtitle})}>保存</button>
        </div>
      </div>
    </div>
  );
}

// ============================================================
// ⏳ Timeline 年份时间线 — 左侧竖线+年份按钮，点击筛选该年目的地
// ============================================================
function Timeline({data,selectedYear,onYearClick,onTripClick}){
  const years=useMemo(()=>[...new Set(data.map(d=>d.year))].sort((a,b)=>b-a),[data]);
  return(
    <div className="timeline-col">
      <div className="timeline-track">
        <div className="timeline-line"></div>
        {years.map(year=>{const trips=data.filter(d=>d.year===year);const expanded=selectedYear===year;
          return(
            <div key={year} className={`timeline-year${expanded?" expanded":""}${expanded?" active":""}`}>
              <span className="timeline-dot"></span>
              <span style={{display:"block",marginTop:4}} onClick={()=>onYearClick(year)}>{year}</span>
              <div className="timeline-trips">{trips.map(t=><button key={t.id} className="timeline-trip" onClick={e=>{e.stopPropagation();onTripClick(t)}} title={t.placeName}>{t.placeName}</button>)}</div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ============================================================
// 🗺️ MapView 旅行地图 — Leaflet 交互地图 + 脉冲标记 + 悬停弹窗 + 年份筛选联动
// ============================================================
function MapView({data,activeId,filteredIds,onMarkerClick,onAdd,onManage,onMarkerDetail}){
  const mapRef=useRef(null);const mapInst=useRef(null);const markers=useRef({});
  useEffect(()=>{if(!mapRef.current)return;const m=L.map(mapRef.current,{center:[33.5,107],zoom:5,zoomControl:true,scrollWheelZoom:true,attributionControl:false});L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png",{maxZoom:18,minZoom:3}).addTo(m);L.control.attribution({position:"bottomleft",prefix:""}).addTo(m);mapInst.current=m;const ro=new ResizeObserver(()=>{m.invalidateSize()});ro.observe(mapRef.current);return()=>{ro.disconnect();m.remove();mapInst.current=null}},[]);

  useEffect(()=>{const m=mapInst.current;if(!m)return;Object.values(markers.current).forEach(mk=>mk.remove());markers.current={};const fd=filteredIds?data.filter(d=>filteredIds.has(d.id)):data;fd.forEach(d=>{const isActive=d.id===activeId;const icon=L.divIcon({className:"custom-marker-container",html:`<div class="pulse-marker${isActive?" active":""}"></div>`,iconSize:[34,34],iconAnchor:[17,17],popupAnchor:[0,-20]});const mk=L.marker(d.coordinates,{icon}).addTo(m);mk.bindPopup(`<div class="map-popup-card"><img src="${d.thumbnail}" alt="${d.placeName}" onerror="this.style.display='none'"/><div class="popup-body"><h4>${d.placeName}</h4><div class="popup-loc">${d.province} · ${d.city}</div><div class="popup-date">${formatDate(d.startDate)}${d.endDate!==d.startDate?" — "+formatDate(d.endDate):""}</div><a class="popup-detail-link" onclick="window.__openTravelDetail&&window.__openTravelDetail('${d.id}')">查看详情 →</a></div></div>`,{maxWidth:240,closeButton:true,className:"custom-popup"});mk.on("click",()=>{onMarkerClick(d.id);onMarkerDetail(d.id)});mk.on("mouseover",function(){if(!this.getPopup().isOpen())this.openPopup()});markers.current[d.id]=mk})},[data,activeId,filteredIds,onMarkerClick,onMarkerDetail]);

  useEffect(()=>{const m=mapInst.current;if(!m||!activeId)return;const d=data.find(x=>x.id===activeId);if(!d)return;m.flyTo(d.coordinates,12,{duration:1.2});const mk=markers.current[activeId];if(mk&&!mk.getPopup().isOpen())setTimeout(()=>mk.openPopup(),800)},[activeId,data]);

  return(
    <div className="map-col" id="map-section">
      <div className="map-wrapper">
        <div id="map" ref={mapRef}></div>
        <div className="map-toolbar">
          <button className="map-toolbar-btn" onClick={onAdd} title="新增目的地">+ 新增</button>
          <button className="map-toolbar-btn" onClick={onManage} title="管理目的地">✎ 管理</button>
        </div>
      </div>
    </div>
  );
}

// ============================================================
// 📍 DestinationCard 目的地卡片 — 缩略图+地名+日期，点击选中/查看详情
// ============================================================
// ============================================================
function DestinationCard({dest,isActive,onClick,onDetail}){
  return(
    <div className={`dest-card${isActive?" active":""}`} onClick={()=>onClick(dest.id)}>
      <div className="card-thumb-area">
        <img src={dest.thumbnail} alt={dest.placeName} onError={e=>{e.target.style.display="none"}}/>
      </div>
      <div className="card-body">
        <div className="card-info">
          <div className="card-title">{dest.placeName}</div>
          <div className="card-sub">
            <span>{dest.province}·{dest.city}</span>
            <span>{formatDate(dest.startDate)}</span>
          </div>
        </div>
        <button className="card-more" onClick={e=>{e.stopPropagation();onDetail(dest)}}>详情 →</button>
      </div>
    </div>

}

// ============================================================
// 📋 SidePanel 右侧信息面板 — 目的地卡片列表 + 标签筛选器 + 导出按钮
// ============================================================
function SidePanel({data,activeId,onSelect,onDetail,onAdd,onExport,customTags,onAddCustomTag,onDeleteCustomTag}){
  const[activeTags,setActiveTags]=useState([]);
  const[newTag,setNewTag]=useState("");
  const[showAddTag,setShowAddTag]=useState(false);
  const allTags=useMemo(()=>{const s=new Set([...customTags]);data.forEach(d=>d.tags.forEach(t=>s.add(t)));return[...s].sort()},[data,customTags]);
  const filtered=useMemo(()=>activeTags.length===0?data:data.filter(d=>d.tags.some(t=>activeTags.includes(t))),[data,activeTags]);

  const handleAddTag=()=>{const t=newTag.trim();if(!t||allTags.includes(t)){setNewTag("");setShowAddTag(false);return};onAddCustomTag(t);setNewTag("");setShowAddTag(false)};

  return(
    <div className="side-panel">
      <div className="side-panel-header">
        <div className="side-panel-title">旅行目的地</div>
        <div className="tag-filters">
          {allTags.map(t=><button key={t} className={`tag-pill${activeTags.includes(t)?" active":""}`} onClick={()=>setActiveTags(p=>p.includes(t)?p.filter(x=>x!==t):[...p,t])}>{t}{customTags.includes(t)&&!data.some(d=>d.tags.includes(t))?<span style={{marginLeft:3,fontSize:"0.55rem",opacity:0.5}} title="自定义标签">*</span>:""}</button>)}
          {activeTags.length>0&&<button className="tag-pill" style={{borderStyle:"solid",color:"var(--text-muted)"}} onClick={()=>setActiveTags([])}>✕ 清除</button>}
          {!showAddTag&&<button className="tag-pill" style={{borderStyle:"dashed",fontSize:"0.75rem"}} onClick={()=>setShowAddTag(true)} title="添加自定义标签">+</button>}
        </div>
        {showAddTag&&(
          <div className="tag-manage-row" style={{marginBottom:6}}>
            <input value={newTag} onChange={e=>setNewTag(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")handleAddTag();if(e.key==="Escape"){setShowAddTag(false);setNewTag("")}}} placeholder="新标签名称…" autoFocus/>
            <button onClick={handleAddTag}>添加</button>
            <button style={{borderColor:"var(--cream-darker)",color:"var(--text-muted)"}} onClick={()=>{setShowAddTag(false);setNewTag("")}}>取消</button>
          </div>
        )}
        <div className="side-panel-actions">
          <button className="btn-add" onClick={onAdd}>+ 新增目的地</button>
          <button className="btn-export" onClick={onExport} title="导出 JSON 备份">⬇ 导出</button>
        </div>
      </div>
      <div className="cards-list">
        {filtered.map(d=><DestinationCard key={d.id} dest={d} isActive={d.id===activeId} onClick={onSelect} onDetail={onDetail}/>)}
        {filtered.length===0&&<div style={{textAlign:"center",padding:40,color:"var(--text-muted)",fontSize:"0.8rem"}}>没有匹配的目的地</div>}
      </div>
    </div>
  );
}

// ============================================================
// 🔍 DetailModal 目的地详情弹窗 — 轮播图+元信息+编辑/删除操作
// ============================================================
function DetailModal({dest,onClose,onEdit,onDelete}){
  const[imgIdx,setImgIdx]=useState(0);
  const allImgs=useMemo(()=>[dest.thumbnail,...(dest.images||[])].filter(Boolean),[dest]);
  const prev=()=>setImgIdx(i=>(i-1+allImgs.length)%allImgs.length);
  const next=()=>setImgIdx(i=>(i+1)%allImgs.length);
  useEffect(()=>{const k=e=>{if(e.key==="Escape")onClose()};window.addEventListener("keydown",k);return()=>window.removeEventListener("keydown",k)},[onClose]);

  return(
    <div className="modal-overlay" onClick={onClose}>
      <div className="detail-modal" onClick={e=>e.stopPropagation()}>
        <div className="detail-carousel" style={{position:"relative"}}>
          {allImgs.length>0&&<img key={imgIdx} src={allImgs[imgIdx]} alt={dest.placeName} onError={e=>{e.target.style.display="none"}}/>}
          <button className="detail-close" onClick={onClose}>✕</button>
          {allImgs.length>1&&<>
            <button className="carousel-arrow left" onClick={prev}>‹</button>
            <button className="carousel-arrow right" onClick={next}>›</button>
            <div className="carousel-dots">{allImgs.map((_,i)=><div key={i} className={`carousel-dot${i===imgIdx?" active":""}`}></div>)}</div>
          </>}
        </div>
        <div className="detail-body">
          <div className="detail-title">{dest.placeName}</div>
          <div className="detail-location">{dest.province} · {dest.city}</div>
          <div className="detail-meta">
            {dest.visits&&dest.visits.length>0?dest.visits.map((v,i)=><div key={i} className="detail-meta-item"><strong>📅 {dest.visits.length>1?`第${i+1}次`:""}</strong> {formatDate(v.startDate)}{v.endDate!==v.startDate?" — "+formatDate(v.endDate):(v.startDate?"":<span style={{color:"var(--text-muted)"}}>未设置</span>)}</div>):<div className="detail-meta-item"><strong>📅 日期</strong> {formatDate(dest.startDate)}{dest.endDate!==dest.startDate?" — "+formatDate(dest.endDate):""}</div>}
            <div className="detail-meta-item"><strong>⏱ 天数</strong> {dest.days}天</div>
            <div className="detail-meta-item"><strong>👥 同行</strong> {dest.companions}</div>
            <div className="detail-meta-item"><strong>🚗 交通</strong> {dest.transport||"—"}</div>
            <div className="detail-meta-item"><strong>💰 费用</strong> ¥{dest.cost?.toLocaleString?.()||dest.cost}</div>
            <div className="detail-meta-item"><strong>🌸 季节</strong> {dest.season||"—"}</div>
          </div>
          {dest.food&&dest.food.length>0&&<div className="detail-meta-item" style={{marginBottom:10}}><strong>🍜 美食</strong> {dest.food.join(" · ")}</div>}
          {dest.tags&&dest.tags.length>0&&<div className="detail-tags">{dest.tags.map(t=><span key={t}>{t}</span>)}</div>}
          {dest.note&&<><div className="detail-note-title">旅行手记</div><div className="detail-note">{dest.note}</div></>}
          <div className="detail-actions">
            <button className="detail-btn primary" onClick={()=>onEdit(dest)}>✎ 编辑</button>
            <button className="detail-btn danger" onClick={()=>{if(window.confirm("确定删除「"+dest.placeName+"」吗？"))onDelete(dest.id)}}>✕ 删除</button>
            {dest.externalLink&&<a href={dest.externalLink} target="_blank" rel="noreferrer" className="detail-btn ghost" style={{textDecoration:"none"}}>🔗 了解更多</a>}
          </div>
        </div>
      </div>
    </div>
  );
}

// ============================================================
// 🏷️ TagInput 标签输入组件 — 药丸展示 + 自动补全 + 回车添加 + 点击删除
// ============================================================
// ============================================================
function TagInput({tags,allTags,onChange,placeholder}){
  const[input,setInput]=useState("");
  const[showSuggest,setShowSuggest]=useState(false);
  const[suggestIdx,setSuggestIdx]=useState(0);
  const wrapRef=useRef(null);
  const suggests=useMemo(()=>{if(!input.trim())return[];const q=input.trim().toLowerCase();return allTags.filter(t=>t.toLowerCase().includes(q)&&!tags.includes(t)).slice(0,6)},[input,allTags,tags]);

  const addTag=t=>{const tag=t||input.trim();if(!tag||tags.includes(tag)){setInput("");setShowSuggest(false);return};onChange([...tags,tag]);setInput("");setShowSuggest(false);setSuggestIdx(0)};
  const removeTag=t=>onChange(tags.filter(x=>x!==t));
  const handleKey=e=>{if(e.key==="Enter"||e.key===","){e.preventDefault();if(showSuggest&&suggests.length>0)addTag(suggests[suggestIdx]);else addTag()}else if(e.key==="Backspace"&&!input&&tags.length>0)removeTag(tags[tags.length-1]);else if(e.key==="ArrowDown"){e.preventDefault();setSuggestIdx(i=>Math.min(i+1,suggests.length-1));setShowSuggest(true)}else if(e.key==="ArrowUp"){e.preventDefault();setSuggestIdx(i=>Math.max(i-1,0))}else if(e.key==="Escape")setShowSuggest(false)};

  useEffect(()=>{if(input.trim())setShowSuggest(true);else setShowSuggest(false);setSuggestIdx(0)},[input]);

  return(
    <div style={{position:"relative"}}>
      <div className="tag-input-wrap" ref={wrapRef} onClick={()=>wrapRef.current?.querySelector("input")?.focus()}>
        {tags.map(t=><span key={t} className="tag-chip">{t}<span className="tag-chip-x" onClick={e=>{e.stopPropagation();removeTag(t)}}>✕</span></span>)}
        <input className="tag-input-field" value={input} onChange={e=>setInput(e.target.value)} onKeyDown={handleKey} onFocus={()=>input.trim()&&setShowSuggest(true)} onBlur={()=>setTimeout(()=>setShowSuggest(false),150)} placeholder={tags.length===0?placeholder||"输入标签，按回车添加…":""}/>
      </div>
      {showSuggest&&suggests.length>0&&(
        <div className="tag-suggest-dropdown">
          {suggests.map((t,i)=><div key={t} className={`tag-suggest-item${i===suggestIdx?" active":""}`} onMouseDown={e=>{e.preventDefault();addTag(t)}} onMouseEnter={()=>setSuggestIdx(i)}>{t}</div>)}
        </div>
      )}
    </div>
  );
}

// ============================================================
// 📝 AddEditModal 新增/编辑旅行记录 — 包含所有字段表单 + 照片上传 + 标签输入
// ============================================================
function AddEditModal({dest,onSave,onClose,allTags}){
  const isEdit=!!dest;
  // 初始化 visits：优先用已有数据，否则默认一次旅行
  const initVisits=dest?.visits||[{startDate:dest?.startDate||"",endDate:dest?.endDate||""}];
  const[visitCount,setVisitCount]=useState(initVisits.length);
  const[visits,setVisits]=useState(initVisits);
  const[form,setForm]=useState(dest||{province:"",city:"",placeName:"",startDate:"",endDate:"",year:new Date().getFullYear(),season:"春",companions:"全家",days:1,transport:"",cost:0,food:[],tags:[],coordinates:[30,110],thumbnail:"",images:[],note:"",externalLink:""});
  const[foodStr,setFoodStr]=useState((dest?.food||[]).join("、"));
  const[tags,setTags]=useState(dest?.tags||[]);
  const[imagesStr,setImagesStr]=useState((dest?.images||[]).join("\n"));
  const[uploadedThumb,setUploadedThumb]=useState(null);
  const[uploadedImages,setUploadedImages]=useState([]);

  const u=(f,v)=>setForm(p=>({...p,[f]:v}));

  const handleFileUpload=(files,type)=>{if(!files||files.length===0)return;const readers=[];Array.from(files).forEach(file=>{const r=new FileReader();readers.push(new Promise(res=>{r.onload=e=>res(e.target.result);r.readAsDataURL(file)}))});Promise.all(readers).then(results=>{if(type==="thumb"){u("thumbnail",results[0]);setUploadedThumb(results[0])}else{setUploadedImages(p=>[...p,...results.filter(Boolean)])}}).catch(()=>{})};

  const clearUploadedThumb=()=>{setUploadedThumb(null);u("thumbnail","")};
  const clearUploadedImg=i=>{setUploadedImages(p=>p.filter((_,idx)=>idx!==i))};

  // 旅行次数变更时，自动扩展/收缩 visits 数组
  const handleVisitCountChange=n=>{const cnt=Math.max(1,Math.min(10,Number(n)||1));setVisitCount(cnt);setVisits(p=>{const arr=[...p];while(arr.length<cnt)arr.push({startDate:"",endDate:""});return arr.slice(0,cnt)})};
  const updateVisit=(i,field,val)=>{setVisits(p=>{const arr=[...p];arr[i]={...arr[i],[field]:val};return arr})};

  const save=()=>{const imgList=[...uploadedImages,...imagesStr.split("\n").map(s=>s.trim()).filter(Boolean)].filter(Boolean);
    // 计算总天数
    const totalDays=visits.reduce((sum,v)=>{if(!v.startDate||!v.endDate)return sum;const s=new Date(v.startDate),e=new Date(v.endDate);return sum+Math.max(1,Math.ceil((e-s)/86400000)+1)},0);
    const firstVisit=visits[0]||{};
    const d={...form,id:dest?.id||String(Date.now()),
      food:foodStr.split(/[、,，]/).map(s=>s.trim()).filter(Boolean),tags,images:imgList,
      visits:visits.filter(v=>v.startDate||v.endDate), // 只保留有日期的
      startDate:firstVisit.startDate||form.startDate,  // 兼容旧字段
      endDate:firstVisit.endDate||form.endDate,
      days:totalDays||Number(form.days)||1,
      cost:Number(form.cost)||0,
      year:firstVisit.startDate?new Date(firstVisit.startDate).getFullYear():Number(form.year)||new Date().getFullYear(),
      coordinates:[Number(form.coordinates[0]),Number(form.coordinates[1])]};
    if(!d.thumbnail&&d.images.length>0)d.thumbnail=d.images[0];if(uploadedThumb)d.thumbnail=uploadedThumb;onSave(d)};

  return(
    <div className="modal-overlay" onClick={onClose}>
      <div className="detail-modal" onClick={e=>e.stopPropagation()} style={{maxWidth:580}}>
        <div className="detail-body">
          <h3 style={{fontFamily:"var(--font-serif)",marginBottom:16,fontSize:"1.15rem"}}>{isEdit?"编辑旅行记录":"新增旅行记录"}</h3>
          <div className="form-row"><div className="form-group"><label>省份</label><input value={form.province} onChange={e=>u("province",e.target.value)} placeholder="如：云南"/></div><div className="form-group"><label>城市</label><input value={form.city} onChange={e=>u("city",e.target.value)} placeholder="如：大理"/></div></div>
          <div className="form-group"><label>目的地名称 *</label><input value={form.placeName} onChange={e=>u("placeName",e.target.value)} placeholder="如：洱海"/></div>
          <div className="form-row"><div className="form-group"><label>旅行次数</label><input type="number" value={visitCount} onChange={e=>handleVisitCountChange(e.target.value)} min="1" max="10" style={{width:"80px"}}/></div><div className="form-group"><label>同行人</label><select value={form.companions} onChange={e=>u("companions",e.target.value)}><option>全家</option><option>夫妻二人</option><option>父子二人</option><option>母女二人</option><option>全家+爷爷奶奶</option><option>独自</option><option>朋友</option></select></div></div>
          {/* 动态日期对：按旅行次数展开 */}
          {visits.map((v,i)=>(
            <div key={i} className="form-row" style={{background:i%2===0?"var(--cream)":"transparent",padding:"8px",borderRadius:"var(--radius-sm)",marginBottom:4}}>
              <div className="form-group"><label>{i===0?"📅 首次日期":`第${i+1}次日期`}</label><input type="date" value={v.startDate} onChange={e=>updateVisit(i,"startDate",e.target.value)}/></div>
              <div className="form-group"><label>至</label><input type="date" value={v.endDate} onChange={e=>updateVisit(i,"endDate",e.target.value)}/></div>
            </div>
          ))}
          <div className="form-row"><div className="form-group"><label>季节</label><select value={form.season} onChange={e=>u("season",e.target.value)}><option>春</option><option>夏</option><option>秋</option><option>冬</option></select></div><div className="form-group"><label>交通</label><input value={form.transport} onChange={e=>u("transport",e.target.value)} placeholder="如：高铁"/></div></div>
          <div className="form-row"><div className="form-group"><label>季节</label><select value={form.season} onChange={e=>u("season",e.target.value)}><option>春</option><option>夏</option><option>秋</option><option>冬</option></select></div><div className="form-group"><label>交通</label><input value={form.transport} onChange={e=>u("transport",e.target.value)} placeholder="如：高铁"/></div></div>
          <div className="form-row"><div className="form-group"><label>费用（元）</label><input type="number" value={form.cost} onChange={e=>u("cost",e.target.value)} min="0"/></div><div className="form-group"><label>坐标 <span style={{fontWeight:400,fontSize:"0.75rem",color:"var(--text-muted)"}}>北纬, 东经</span></label><input value={form.coordinates.join(",")} onChange={e=>{const p=e.target.value.split(",");if(p.length===2)u("coordinates",[p[0].trim(),p[1].trim()])}} placeholder="纬度, 经度 — 如 25.05, 102.72 (昆明)"/></div></div>
          <div className="form-group"><label>美食（顿号分隔）</label><input value={foodStr} onChange={e=>setFoodStr(e.target.value)} placeholder="过桥米线、乳扇"/></div>
          <div className="form-group"><label>旅行标签</label><TagInput tags={tags} allTags={allTags} onChange={setTags} placeholder="输入标签，回车添加…"/></div>
          <div className="form-group">
            <label>缩略图</label>
            <input value={form.thumbnail} onChange={e=>u("thumbnail",e.target.value)} placeholder="https://... 或上传本地图片"/>
            <div className="photo-upload-row">
              <label className="upload-btn" style={{marginTop:4}}>📁 本地上传<input type="file" accept="image/*" onChange={e=>{handleFileUpload(e.target.files,"thumb");e.target.value=""}}/></label>
            </div>
            {uploadedThumb&&<div className="photo-previews"><div className="photo-preview-item"><img src={uploadedThumb} alt=""/><span className="preview-label">封面</span><button className="preview-del" onClick={clearUploadedThumb}>✕</button></div></div>}
          </div>
          <div className="form-group">
            <label>更多图片 URLs（每行一个）</label>
            <textarea value={imagesStr} onChange={e=>setImagesStr(e.target.value)} placeholder="https://..." rows={3}/>
            <div className="photo-upload-row">
              <label className="upload-btn" style={{marginTop:4}}>📁 批量上传<input type="file" accept="image/*" multiple onChange={e=>{handleFileUpload(e.target.files,"images");e.target.value=""}}/></label>
            </div>
            {uploadedImages.length>0&&<div className="photo-previews">{uploadedImages.map((url,i)=><div key={i} className="photo-preview-item"><img src={url} alt=""/><button className="preview-del" onClick={()=>clearUploadedImg(i)}>✕</button></div>)}</div>}
          </div>
          <div className="form-group"><label>游记/备注</label><textarea value={form.note} onChange={e=>u("note",e.target.value)} placeholder="记录旅途回忆..." rows={3}/></div>
          <div className="form-actions"><button className="detail-btn ghost" onClick={onClose}>取消</button><button className="detail-btn primary" onClick={save}>{isEdit?"保存修改":"添加记录"}</button></div>
        </div>
      </div>
    </div>
  );
}

        </div>
        {allImages.length>12&&<div className="gallery-more-wrap"><button className="gallery-more-btn" onClick={()=>setShowAll(s=>!s)}>{showAll?"收起":"浏览全部 "+allImages.length+" 张照片"}</button></div>}

        <div id="notes-section" style={{marginTop:showAll?0:60}}>
          <div className="section-header"><span className="section-title">旅行手记</span></div>
          <div className="section-sub" style={{marginBottom:12}}>旅途中的只言片语</div>
          <div className="section-toolbar" style={{marginBottom:20}}>
            <button className="section-edit-btn add-btn" onClick={onAddNote}>+ 写手记</button>
          </div>

// ============================================================
// 🔧 Footer 页脚 — localStorage用量指示 + 百度网盘连接 + 数据导出/导入
// ============================================================
function Footer({onExport,onImport,storageBytes,baidu,onToast,syncNow,onBaiduLogout}){
  const fileRef=useRef(null);
  const handleImport=()=>{const f=fileRef.current?.files?.[0];if(!f)return;const r=new FileReader();r.onload=e=>{try{const d=JSON.parse(e.target.result);if(Array.isArray(d))onImport(d);else alert("无效数据格式")}catch{alert("JSON 解析失败")}};r.readAsText(f)};

  const storageInfo=useMemo(()=>{const MB=storageBytes/(1024*1024);return{mb:MB,limitMB:5,pct:Math.min(100,Math.round(MB/5*100))}},[storageBytes]);
  const level=storageInfo.pct>90?"danger":storageInfo.pct>70?"warning":"";
  const storageLabel=storageInfo.pct>90?"⚠️ 存储将满":storageInfo.pct>70?"💾 存储":"💾 存储";

  return(
    <footer className="footer">
      <div className="footer-inner">
        <p className="footer-text">© 2025 家庭旅行相册 · 用心记录每一段旅程</p>
        <div className="footer-links" style={{alignItems:"center"}}>
          <span className="storage-indicator" title={`已用约 ${storageInfo.mb.toFixed(2)} MB / ${storageInfo.limitMB} MB — localStorage 上限 5MB，建议定期导出备份`}>
            {storageLabel}
            <span className="storage-bar-track"><span className={`storage-bar-fill${level?" "+level:""}`} style={{width:storageInfo.pct+"%"}}></span></span>
            <span className="storage-pct">{storageInfo.pct}%</span>
          </span>
          <BaiduPanel token={baidu.token} user={baidu.user} login={baidu.login} logout={onBaiduLogout} syncing={baidu.syncing} onToast={onToast} authError={baidu.authError} onSyncNow={syncNow}/>
          <button onClick={onExport}>⬇ JSON 备份导出</button>
          <label style={{cursor:"pointer",fontSize:"0.73rem",color:"var(--text-muted)",transition:"var(--transition)"}} onMouseEnter={e=>e.target.style.color="var(--gold-light)"} onMouseLeave={e=>e.target.style.color="var(--text-muted)"}>⬆ 导入数据恢复<input type="file" accept=".json" ref={fileRef} onChange={handleImport} style={{display:"none"}}/></label>
        </div>
      </div>
    </footer>
  );
}

// ============================================================
// 🖼️ ImageViewer 全屏图片浏览器 — 左右键导航 + 缩略图条 + Esc关闭
// ============================================================
function ImageViewer({images,startIndex,onClose}){
  const[idx,setIdx]=useState(startIndex||0);
  const valid=useMemo(()=>images.filter(Boolean),[images]);
  useEffect(()=>{const k=e=>{if(e.key==="Escape")onClose();if(e.key==="ArrowLeft")setIdx(i=>(i-1+valid.length)%valid.length);if(e.key==="ArrowRight")setIdx(i=>(i+1)%valid.length)};window.addEventListener("keydown",k);document.body.style.overflow="hidden";return()=>{window.removeEventListener("keydown",k);document.body.style.overflow=""}},[onClose,valid.length]);
  if(valid.length===0)return null;
  return(
    <div className="image-viewer-overlay" onClick={onClose}>
      <button className="viewer-close" onClick={onClose}>✕</button>
      <div className="viewer-info">{idx+1} / {valid.length}</div>
      <div className="viewer-main" onClick={e=>e.stopPropagation()}>
        <button className="viewer-nav prev" onClick={()=>setIdx(i=>(i-1+valid.length)%valid.length)}>‹</button>
        <img key={idx} src={valid[idx]} alt="" onError={e=>{e.target.style.display="none"}}/>
        <button className="viewer-nav next" onClick={()=>setIdx(i=>(i+1)%valid.length)}>›</button>
      </div>
      <div className="viewer-thumbnails" onClick={e=>e.stopPropagation()}>{valid.map((img,i)=><div key={i} className={`viewer-thumb${i===idx?" active":""}`} onClick={()=>setIdx(i)}><img src={img} alt="" onError={e=>{e.target.style.display="none"}}/></div>)}</div>
    </div>
  );
}

// ============================================================
// 🎞️ GalleryManager 照片管理器 — 按目的地删照片/上传/设封面
// ============================================================
function GalleryManager({data,onDeletePhoto,onAddPhotos,onSetThumbnail,onClose}){
  const[addUrls,setAddUrls]=useState({});
  const[uploadPreviews,setUploadPreviews]=useState({});
  const setUrl=(destId,v)=>setAddUrls(p=>({...p,[destId]:v}));
  const handleAdd=(destId)=>{const urls=addUrls[destId];if(!urls||!urls.trim())return;const list=urls.split("\n").map(s=>s.trim()).filter(Boolean);if(list.length===0)return;onAddPhotos(destId,list);setUrl(destId,"")};
  const handleFileUpload=(destId,files)=>{if(!files||files.length===0)return;const readers=[];Array.from(files).forEach(file=>{const r=new FileReader();readers.push(new Promise(res=>{r.onload=e=>res(e.target.result);r.readAsDataURL(file)}))});Promise.all(readers).then(results=>{onAddPhotos(destId,results.filter(Boolean))}).catch(()=>{})};
  useEffect(()=>{const k=e=>{if(e.key==="Escape")onClose()};window.addEventListener("keydown",k);return()=>window.removeEventListener("keydown",k)},[onClose]);

  return(
    <div className="modal-overlay" onClick={onClose}>
      <div className="gm-modal" onClick={e=>e.stopPropagation()}>
        <h3>🖼 管理照片</h3>
        {data.length===0&&<div className="gm-empty">还没有旅行记录，先去地图板块添加目的地吧</div>}
        {data.map(dest=>{const allPhotos=[dest.thumbnail,...(dest.images||[])].filter(Boolean);
          return(
            <div key={dest.id} className="gm-dest-group">
              <div className="gm-dest-header">
                <div>
                  <span className="gm-dest-name">{dest.placeName}</span>
                  <span className="gm-dest-meta" style={{marginLeft:10}}>{dest.province} · {dest.city} · {formatDate(dest.startDate)}</span>
                </div>
              </div>
              <div className="gm-photos-grid">
                {allPhotos.map((url,i)=>{
                  const isThumb=i===0&&url===dest.thumbnail;
                  return(
                    <div key={i} className={`gm-photo-item${isThumb?" is-thumb":""}`} title={isThumb?"封面照片":"点击设为封面"}>
                      <img src={url} alt="" onError={e=>{e.target.style.display="none"}}/>
                      <button className="gm-photo-del" onClick={()=>onDeletePhoto(dest.id,i)} title="删除照片">✕</button>
                      {!isThumb&&<button className="gm-set-thumb-btn" style={{position:"absolute",bottom:3,left:3,fontSize:"0.55rem",padding:"2px 6px"}} onClick={()=>onSetThumbnail(dest.id,url)}>封面</button>}
                    </div>
                  );
                })}
                {allPhotos.length===0&&<div style={{padding:10,fontSize:"0.68rem",color:"var(--text-muted)"}}>暂无照片</div>}
              </div>
              <div className="gm-add-row">
                <input value={addUrls[dest.id]||""} onChange={e=>setUrl(dest.id,e.target.value)} placeholder={`为「${dest.placeName}」添加照片URL（每行一个）…`}/>
                <button onClick={()=>handleAdd(dest.id)}>添加</button>
              </div>
              <div className="gm-add-row" style={{paddingTop:0}}>
                <label className="upload-btn" style={{fontSize:"0.65rem",padding:"5px 12px"}}>📁 本地上传<input type="file" accept="image/*" multiple onChange={e=>{handleFileUpload(dest.id,e.target.files);e.target.value=""}}/></label>
              </div>
            </div>
          );
        })}
        <div className="form-actions" style={{marginTop:8}}><button className="detail-btn ghost" onClick={onClose}>关闭</button></div>
      </div>
    </div>
  );
}
